<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-LOG | 실시간 김프 & 경제 캘린더 & 뉴스</title>
    
    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-5553376072633585">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5553376072633585" crossorigin="anonymous"></script>
    
    <!-- Google Fonts & Icons -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- External Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <style>
        :root {
            --bg: #05070a; --card-bg: #0f172a; --nav-bg: #0f172a; --text: #f8fafc;
            --text-muted: #94a3b8; --border: #1e293b; --accent: #00f2ff;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
            --ai-gradient: linear-gradient(135deg, #00f2ff 0%, #3b82f6 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Pretendard", sans-serif; }
        body { background-color: var(--bg); color: var(--text); font-size: 13px; overflow-x: hidden; }

        header { background: var(--nav-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .nav-container { max-width: 1750px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 65px; }
        .logo { font-size: 26px; font-weight: 900; background: var(--ai-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1.5px; cursor: pointer; }
        
        .main-menu { display: flex; gap: 20px; align-items: center; margin-left: 40px; }
        .menu-item { color: var(--text-muted); font-weight: 700; cursor: pointer; font-size: 13.5px; transition: 0.3s; padding: 22px 0; border-bottom: 2px solid transparent; white-space: nowrap; position: relative; }
        .menu-item:hover, .menu-item.active { color: var(--accent); border-bottom-color: var(--accent); }

        .main-container { max-width: 1750px; margin: 20px auto; display: grid; grid-template-columns: 300px 1fr 340px; gap: 20px; padding: 0 20px; }
        .left-area, .right-area { display: flex; flex-direction: column; gap: 20px; }
        .right-area, .left-area-content { position: sticky; top: 85px; height: calc(100vh - 110px); }
        .left-area-content { overflow-y: auto; padding-right: 5px; }

        .pro-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 15px; }
        .card-header { padding: 10px 15px; font-weight: 800; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .card-body { padding: 15px; }

        .mini-stat { margin-bottom: 18px; }
        .mini-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .mini-value { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text); }
        
        .btn-journal-nav { background: var(--ai-gradient); color: #000; padding: 8px 16px; border-radius: 8px; font-weight: 800; font-size: 12px; cursor: pointer; border: none; display: flex; align-items: center; gap: 6px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2); }
        .btn-journal-nav:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 242, 255, 0.4); }
        
        .btn-cal-filter { background: var(--border); color: var(--text-muted); opacity: 0.8; }
        .btn-cal-filter.active-cal { background: var(--ai-gradient); color: #000; opacity: 1; }

        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.3); padding: 12px 10px; text-align: left; color: var(--text-muted); font-size: 11px; }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }
        tr:hover { background: rgba(255,255,255,0.03); cursor: pointer; }
        .coin-icon { width: 20px; height: 20px; border-radius: 50%; vertical-align: middle; margin-right: 8px; }

        .pnl-up { color: var(--success); }
        .pnl-down { color: var(--danger); }
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        .news-card { cursor: pointer; transition: 0.3s; height: 100%; border-left: 3px solid transparent; }
        .news-card:hover { border-left-color: var(--accent); background: rgba(255,255,255,0.02); transform: translateX(5px); }

        .alert-tag { font-weight: 800; padding: 2px 4px; border-radius: 4px; font-size: 9px; margin-right: 5px; }
        .tag-buy { background: rgba(34, 197, 94, 0.1); color: var(--success); }

        #econCalendar { filter: invert(0.9) hue-rotate(180deg) brightness(1.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo" onclick="location.reload()">K-LOG</div>
            <nav class="main-menu">
                <div class="menu-item active" id="m-coin" onclick="switchView('coin')">암호화폐</div>
                <div class="menu-item" id="m-news" onclick="switchView('news')">뉴스</div>
                <div class="menu-item" id="m-calendar" onclick="switchView('calendar')">경제 캘린더</div>
                <div class="menu-item" id="m-analysis" onclick="switchView('analysis')"><i class="fa-solid fa-wand-magic-sparkles"></i> AI 시황분석</div>
            </nav>
            <div class="header-right">
                <div class="utility-icons" style="display:flex; gap:15px; align-items:center; color:var(--text-muted);">
                    <button class="btn-journal-nav" onclick="switchView('journal')"><i class="fa-solid fa-book"></i> 매매일지</button>
                    <i class="fa-solid fa-gear u-icon" style="cursor:pointer;"></i>
                    <i class="fa-solid fa-circle-user u-icon" style="font-size: 22px; cursor:pointer;"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside class="left-area">
            <div class="left-area-content">
                <div class="pro-card">
                    <div class="card-header">📈 시장 분석 (Market Insight)</div>
                    <div class="card-body">
                        <div class="mini-stat">
                            <div class="mini-label">거래량 (24H)</div>
                            <div class="mini-value"><span id="totalVol">--</span></div>
                        </div>
                        <div class="mini-stat">
                            <div class="mini-label">글로벌 시가총액</div>
                            <div class="mini-value"><span id="totalCap">--</span></div>
                        </div>
                        <div class="mini-stat" style="border-top:1px solid var(--border); padding-top:15px;">
                            <div class="mini-label">공포·탐욕 지수</div>
                            <div class="mini-value" style="font-size:16px;"><span id="fngValMini">--</span> <span id="fngLabelMini" style="font-size:12px; font-weight:800;">데이터 로딩 중...</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="center-area">
            <!-- 1. 암호화폐 뷰 -->
            <div id="view-coin" class="view-section active">
                <div class="pro-card" style="margin-bottom:20px; height:450px;"><div id="tv_chart_container" style="height:100%; width:100%"></div></div>
                <div style="display:grid; grid-template-columns: 1fr auto; gap:15px; margin-bottom:15px; align-items: end;">
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="coinSearch" placeholder="코인 검색" style="flex:1; background:var(--card-bg); border:1px solid var(--border); border-radius:8px; padding:10px 15px; color:var(--text);" oninput="renderTable()">
                        <select id="sortSelect" style="background:var(--card-bg); border:1px solid var(--border); color:var(--text); padding:0 15px; border-radius:8px;" onchange="renderTable()">
                            <option value="vol">거래대금순</option>
                            <option value="kimp">김프높은순</option>
                            <option value="change">변동률순</option>
                        </select>
                    </div>
                    <div style="text-align:right; font-size:12px; background:var(--card-bg); border:1px solid var(--border); padding:8px 15px; border-radius:8px;">
                        <span style="color:var(--text-muted);">USDT:</span> <b id="usdtDisplay" style="color:var(--accent);">--</b>
                    </div>
                </div>
                <div class="pro-card">
                    <table>
                        <thead><tr><th>코인명</th><th>업비트</th><th>바이낸스</th><th>김프</th><th>전일대비</th><th style="text-align:right;">거래대금</th></tr></thead>
                        <tbody id="globalBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 2. 경제 캘린더 뷰 -->
            <div id="view-calendar" class="view-section">
                <div class="pro-card" style="margin-bottom:15px;">
                    <div class="card-header">📅 경제 일정 필터</div>
                    <div class="card-body" style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                        <button class="btn-journal-nav btn-cal-filter" onclick="updateCalendar('yesterday')">어제</button>
                        <button class="btn-journal-nav btn-cal-filter active-cal" onclick="updateCalendar('today')">오늘</button>
                        <button class="btn-journal-nav btn-cal-filter" onclick="updateCalendar('tomorrow')">내일</button>
                        <button class="btn-journal-nav btn-cal-filter" onclick="updateCalendar('this_week')">이번주</button>
                        <div style="flex:1;"></div>
                        <select id="importanceSelect" style="background:var(--card-bg); border:1px solid var(--border); color:var(--text); padding:8px 15px; border-radius:8px;" onchange="updateCalendar(currentDuration)">
                            <option value="1,2,3">모든 중요도</option>
                            <option value="2,3">보통 이상</option>
                            <option value="3">중요도 높음</option>
                        </select>
                    </div>
                </div>
                <div class="pro-card" style="height: 750px; overflow: hidden;"><iframe id="econCalendar" src="https://sslecal.investing.com/e_cal.php?duration=today&countries=1,2,5,6,11,14,25,35,43,72&importance=1,2,3&features=datepicker,timezone&languages=18&curr_id=1" width="100%" height="100%" frameborder="0" allowtransparency="true"></iframe></div>
            </div>

            <!-- 3. 뉴스 뷰 -->
            <div id="view-news" class="view-section"></div>

            <div id="view-journal" class="view-section"><div class="pro-card" style="padding:100px; text-align:center;">매매일지 (준비 중)</div></div>
        </main>

        <aside class="right-area">
            <div class="pro-card">
                <div class="card-header">📐 리스크 계산기</div>
                <div class="card-body">
                    <input type="text" id="calcAssetName" placeholder="심볼" style="width:100%; background:var(--bg); border:1px solid var(--border); padding:8px; border-radius:6px; color:var(--text); margin-bottom:8px;">
                    <input type="number" id="calcPrice" placeholder="현재가 ($)" style="width:100%; background:var(--bg); border:1px solid var(--border); padding:8px; border-radius:6px; color:var(--text); margin-bottom:8px;">
                    <button class="btn-journal-nav" style="width:100%; justify-content:center;">데이터 적용</button>
                </div>
            </div>
        </aside>
    </div>

    <script>
        let krwMarkets = [], binancePrices = {}, tickerData = {}, usdtRate = 1467, baseRate = 1445;
        let currentDuration = 'today';

        async function init() {
            loadChart('BTC');
            try {
                const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.upbit.com/v1/ticker?markets=KRW-USDT'));
                const rj = await r.json(); 
                usdtRate = JSON.parse(rj.contents)[0].trade_price;
                document.getElementById('usdtDisplay').innerText = usdtRate.toLocaleString();
                
                const gRes = await fetch('https://api.coingecko.com/api/v3/global');
                const gData = await gRes.json();
                document.getElementById('totalCap').innerText = (gData.data.total_market_cap.krw / 1000000000000).toFixed(1) + '조';
                document.getElementById('totalVol').innerText = (gData.data.total_volume.krw / 1000000000000).toFixed(1) + '조';

                const fRes = await fetch('https://api.alternative.me/fng/');
                const fData = await fRes.json();
                document.getElementById('fngValMini').innerText = fData.data[0].value;
                document.getElementById('fngLabelMini').innerText = '— ' + fData.data[0].value_classification;

                const mRes = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.upbit.com/v1/market/all'));
                const mData = await mRes.json(); 
                krwMarkets = JSON.parse(mData.contents).filter(x => x.market.startsWith('KRW-'));

                const bRes = await fetch('https://api.binance.com/api/v3/ticker/price');
                const bData = await bRes.json(); 
                bData.forEach(p => { if(p.symbol.endsWith('USDT')) binancePrices[p.symbol.replace('USDT','')] = parseFloat(p.price); });

                connectWebSocket();
                renderTable();
            } catch(e) { console.error(e); }
        }

        function connectWebSocket() {
            const socket = new WebSocket('wss://api.upbit.com/websocket/v1');
            socket.onopen = () => { socket.send(JSON.stringify([{"ticket":"test"},{"type":"ticker","codes":krwMarkets.map(m => m.market)}])); };
            socket.onmessage = async (e) => { 
                const data = JSON.parse(await e.data.text()); 
                tickerData[data.code] = data; 
            };
        }

        function renderTable() {
            const body = document.getElementById('globalBody'); if(!body) return;
            const searchTerm = document.getElementById('coinSearch').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;
            
            let filteredMarkets = krwMarkets.filter(m => m.market.replace('KRW-', '').toLowerCase().includes(searchTerm) || m.korean_name.includes(searchTerm));

            filteredMarkets.sort((a,b) => {
                const ta = tickerData[a.market], tb = tickerData[b.market];
                if(!ta || !tb) return 0;
                if(sortBy === 'vol') return tb.acc_trade_price_24h - ta.acc_trade_price_24h;
                if(sortBy === 'change') return tb.signed_change_rate - ta.signed_change_rate;
                return 0;
            });

            let html = '';
            filteredMarkets.forEach(m => {
                const t = tickerData[m.market]; if(!t) return;
                const symbol = m.market.replace('KRW-', '');
                const bPrice = binancePrices[symbol] || 0;
                const convertedBinance = bPrice * usdtRate;
                const kimp = convertedBinance > 0 ? ((t.trade_price - convertedBinance) / convertedBinance * 100) : 0;

                html += `<tr onclick="loadChart('${symbol}')">
                    <td><img src="https://static.upbit.com/logos/${symbol}.png" class="coin-icon"><b>${m.korean_name}</b></td>
                    <td style="font-weight:700;">${t.trade_price.toLocaleString()}</td>
                    <td>${bPrice ? bPrice.toLocaleString() : '-'}</td>
                    <td class="${kimp>=0?'pnl-up':'pnl-down'}">${kimp.toFixed(2)}%</td>
                    <td class="${t.signed_change_rate>=0?'pnl-up':'pnl-down'}">${(t.signed_change_rate*100).toFixed(2)}%</td>
                    <td style="text-align:right; color:var(--text-muted);">${Math.floor(t.acc_trade_price_24h/1000000).toLocaleString()}M</td>
                </tr>`;
            });
            body.innerHTML = html;
        }

        setInterval(renderTable, 3000);

        function loadChart(symbol) {
            new TradingView.widget({ "autosize": true, "symbol": `UPBIT:${symbol}KRW`, "interval": "60", "timezone": "Asia/Seoul", "theme": "dark", "style": "1", "locale": "ko", "container_id": "tv_chart_container" });
        }

        function switchView(v) {
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            const m = document.getElementById(`m-${v}`); if(m) m.classList.add('active');
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(`view-${v}`); if(target) target.classList.add('active');
            if(v === 'news') fetchNews();
        }

        function updateCalendar(duration = currentDuration) {
            currentDuration = duration;
            const importance = document.getElementById('importanceSelect').value;
            const iframe = document.getElementById('econCalendar');
            document.querySelectorAll('.btn-cal-filter').forEach(btn => {
                btn.classList.remove('active-cal');
                if(btn.innerText.includes(duration === 'today' ? '오늘' : duration === 'yesterday' ? '어제' : duration === 'tomorrow' ? '내일' : '이번주')) btn.classList.add('active-cal');
            });
            iframe.src = `https://sslecal.investing.com/e_cal.php?duration=${duration}&countries=1,2,5,6,11,14,25,35,43,72&importance=${importance}&features=datepicker,timezone&languages=18&curr_id=1`;
        }

        async function fetchNews() {
            const newsContainer = document.getElementById('view-news');
            newsContainer.innerHTML = '<div class="pro-card" style="padding:100px; text-align:center;"><i class="fa-solid fa-spinner fa-spin"></i> 뉴스를 불러오는 중...</div>';
            let newsItems = [];

            try {
                const upbitRes = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api-manager.upbit.com/api/v1/notices?page=1&per_page=5'));
                const upbitData = JSON.parse((await upbitRes.json()).contents);
                upbitData.data.list.forEach(item => {
                    const date = new Date(item.created_at).toLocaleString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                    newsItems.push(`<div class="pro-card news-card" onclick="window.open('https://upbit.com/service_center/notice?id=${item.id}', '_blank')">
                        <div class="card-header"><span class="alert-tag tag-buy">UPBIT</span> ${date}</div>
                        <div class="card-body"><h3 style="font-size:13.5px; color:var(--accent); font-weight:800;">${item.title}</h3></div>
                    </div>`);
                });
            } catch (e) { console.error(e); }

            try {
                const rssRes = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://kr.investing.com/rss/news_285.rss'));
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString((await rssRes.json()).contents, "text/xml");
                xmlDoc.querySelectorAll("item").forEach((item, idx) => {
                    if(idx > 10) return;
                    const title = item.querySelector("title")?.textContent;
                    const pubDate = new Date(item.querySelector("pubDate")?.textContent).toLocaleString('ko-KR', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                    newsItems.push(`<div class="pro-card news-card" onclick="window.open('${item.querySelector("link")?.textContent}', '_blank')">
                        <div class="card-header"><span class="alert-tag" style="background:rgba(59,130,246,0.1); color:#3b82f6;">INVESTING</span> ${pubDate}</div>
                        <div class="card-body"><h3 style="font-size:13.5px; font-weight:800;">${title}</h3></div>
                    </div>`);
                });
            } catch (e) { console.error(e); }

            newsContainer.innerHTML = newsItems.length > 0 ? `<div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap:15px; padding:5px;">${newsItems.join('')}</div>` : '<div class="pro-card" style="padding:100px; text-align:center;">뉴스 로딩 실패</div>';
        }

        window.onload = init;
    </script>
</body>
</html>
