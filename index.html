<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트레이딩 마스터 매매일지 | v9.13 Mastery</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #ffffff; --text: #37352f; --text-muted: rgba(55, 53, 47, 0.65); --border: #e9e9e8;
            --hover: #f1f1ef; --accent: #2383e2; --success-text: #ff5252; --danger-text: #3b82f6;
            --long-color: #ff5252; --short-color: #3b82f6; --gold: #f59e0b;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #191919; --text: #d3d3d3; --text-muted: rgba(255, 255, 255, 0.45); --border: #2f2f2f; --hover: #2c2c2c; }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Pretendard", sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 50px; }
        .cover { height: 140px; width: 100%; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 60px; position: relative; }
        .icon { font-size: 78px; margin-top: -45px; margin-bottom: 20px; display: inline-block; background: var(--bg); border-radius: 20px; }
        .tab-wrapper { border-bottom: 1px solid var(--border); margin-bottom: 30px; display: flex; gap: 20px; }
        .tab-item { padding: 10px 4px; font-size: 14px; font-weight: 700; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; }
        .tab-item.active { color: var(--accent); border-bottom-color: var(--accent); }
        .exchange-rate-bar { position: absolute; top: 20px; right: 60px; background: rgba(0,0,0,0.5); color: white; padding: 8px 15px; border-radius: 20px; font-size: 12px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .main-layout { display: grid; grid-template-columns: 1fr 380px; gap: 40px; margin-top: 20px; }
        .analytics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-item { background: var(--hover); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-item .label { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; font-weight: 700; }
        .stat-item .value { font-size: 18px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
        .db-title { font-size: 14px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 12px 10px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .card { background: var(--hover); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .field { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; }
        input, textarea { width: 100%; border: 1px solid var(--border); padding: 8px 12px; border-radius: 4px; background: var(--bg); color: var(--text); font-size: 13px; }
        .dir-btn { padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); font-weight: 800; cursor: pointer; font-size: 12px; }
        .dir-btn.long.active { background: var(--long-color); color: white; border-color: var(--long-color); }
        .dir-btn.short.active { background: var(--short-color); color: white; border-color: var(--short-color); }
        .btn-save { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 800; width: 100%; cursor: pointer; }
        .btn-apply { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 800; width: 100%; cursor: pointer; }
        .result-box { margin-top: 10px; padding: 12px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); font-size: 12px; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .gold-text { color: var(--gold) !important; font-weight: 800; }
        .tag-btn { padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); font-size: 10px; font-weight: 700; cursor: pointer; }
        .tag-btn.active { background: var(--accent); color: white; }
        .pnl-up { color: var(--success-text); } .pnl-down { color: var(--danger-text); }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .view-section { display: none; } .view-section.active { display: block; }
    </style>
</head>
<body>
    <div class="cover"></div>
    <div class="container">
        <span class="icon">🏆</span>
        <h1 id="mainTitle">TRADING MULTI-HUB <small style="font-size: 12px; color:var(--text-muted);">v9.13 Mastery</small></h1>
        <div class="exchange-rate-bar">USDT/KRW: <strong id="liveRate">Loading...</strong>원 | 김프: <strong id="topKimp">0.00%</strong></div>
        <div class="tab-wrapper">
            <div class="tab-item active" onclick="switchTab('binance')">바이낸스 (Master)</div>
            <div class="tab-item" onclick="switchTab('upbit')">업비트 (국내)</div>
            <div class="tab-item" onclick="switchTab('bybit')">바이비트 (해외)</div>
            <div class="tab-item" onclick="switchTab('global')">글로벌 통합 (김프)</div>
        </div>
        <div id="view-binance" class="view-section active">
            <div class="analytics-grid">
                <div class="stat-item"><div class="label">오늘 손익</div><div id="statToday" class="value">0</div></div>
                <div class="stat-item"><div class="label">주간 손익</div><div id="statWeek" class="value">0</div></div>
                <div class="stat-item"><div class="label">월간 손익</div><div id="statMonth" class="value">0</div></div>
                <div class="stat-item"><div class="label">총 누적 손익</div><div id="statTotal" class="value">0</div></div>
            </div>
            <div class="main-layout">
                <div><div class="db-title">📋 바이낸스 매매 복기 히스토리</div><table><thead><tr><th>차트</th><th>날짜</th><th>종목</th><th>방향</th><th>진입/청산</th><th style="text-align:right;">손익($)</th><th>태그</th><th style="width:30px;"></th></tr></thead><tbody id="dbBody"></tbody></table></div>
                <aside id="sidebar-master"></aside>
            </div>
        </div>
        <div id="view-other" class="view-section">
            <div class="main-layout">
                <div>
                    <div class="db-title" id="otherTitle">글로벌 거래소 시세 비교</div>
                    <div id="exchangeToggleBox" style="display:none; margin-bottom:15px; background:var(--hover); padding:10px; border-radius:12px;">
                        <label style="margin-bottom:8px; display:block;">🏦 노출 거래소 설정</label>
                        <div style="display:flex; gap:8px;">
                            <span class="tag-btn active" id="toggle-binance" onclick="toggleColumn(1, 'binance')">Binance</span>
                            <span class="tag-btn active" id="toggle-bybit" onclick="toggleColumn(2, 'bybit')">Bybit</span>
                            <span class="tag-btn active" id="toggle-okx" onclick="toggleColumn(3, 'okx')">OKX</span>
                            <span class="tag-btn active" id="toggle-upbit" onclick="toggleColumn(4, 'upbit')">Upbit/Kimp</span>
                        </div>
                    </div>
                    <div class="field" id="globalSearchBox" style="display:none;"><input type="text" id="globalSearch" placeholder="코인 검색 (BTC, SOL...)" oninput="updateGlobalPrices()"></div>
                    <table id="globalTable" style="display:none;">
                        <thead><tr><th>종목</th><th>Binance (펀비)</th><th>Bybit (펀비)</th><th>OKX (펀비)</th><th>Upbit 원화</th><th style="text-align:right;">김프(%)</th></tr></thead>
                        <tbody id="globalBody"></tbody>
                    </table>
                </div>
                <aside id="sidebar-viewer"></aside>
            </div>
        </div>
    </div>
    <template id="template-master-sidebar">
        <div class="card">
            <label>📏 계산기</label>
            <input type="text" id="calcAssetName" placeholder="종목명">
            <div style="display:flex; gap:4px; margin-top:5px;"><input type="number" id="calcPrice" placeholder="현재가" oninput="runCalc()"><button onclick="fetchLivePrice('calc_only', this)" style="padding:0 10px;">⚡</button></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                <div class="field"><label>총 자본($)</label><input type="number" id="calcEntry" value="150" oninput="runCalc()"></div>
                <div class="field"><label>레버리지</label><input type="number" id="calcLev" value="10" oninput="runCalc()"></div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="field"><label>리스크(%)</label><input type="number" id="calcRiskPct" value="1" oninput="runCalc()"></div>
                <div class="field"><label>손절폭(%)</label><input type="number" id="calcSl" value="5" oninput="runCalc()"></div>
            </div>
            <div class="field"><label>손익비 (1:X)</label><input type="number" id="calcRr" value="2" oninput="runCalc()"></div>
            <div class="result-box">
                <div class="result-row"><span>리스크:</span><strong id="resRiskAmt" class="pnl-down">0 $</strong></div>
                <div class="result-row"><span>증거금:</span><strong id="resMargin" class="gold-text">0 $</strong></div>
                <div class="result-row"><span>수량:</span><strong id="resQty" class="gold-text">0</strong></div>
                <div class="result-row"><span>TP/SL:</span><span><b class="pnl-up" id="resTpPrice">0</b>/<b class="pnl-down" id="resSlPrice">0</b></span></div>
            </div>
            <button class="btn-apply" style="width:100%; margin-top:10px;" onclick="applyToLog()">기록장에 적용</button>
        </div>
        <div class="card" style="background:var(--hover);">
            <label>📝 매매 복기</label>
            <div style="display:flex; gap:5px; margin-bottom:10px;"><button class="dir-btn long active" id="btnLong" onclick="setDirection('LONG')" style="flex:1;">LONG</button><button class="dir-btn short" id="btnShort" onclick="setDirection('SHORT')" style="flex:1;">SHORT</button></div>
            <input type="text" id="assetName" placeholder="종목명">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:5px;">
                <input type="number" id="entryPrice" placeholder="진입가" oninput="updatePnlPreview()">
                <input type="number" id="exitPrice" placeholder="청산가" oninput="updatePnlPreview()">
            </div>
            <input type="number" id="tradeQty" placeholder="수량" style="margin-top:5px;" oninput="updatePnlPreview()">
            <div style="margin:10px 0; font-weight:800; text-align:center;" id="pnlValue">0.00 $</div>
            <textarea id="tradeMemo" placeholder="메모..."></textarea>
            <button class="btn-save" style="margin-top:10px;" onclick="addRecord()">기록 저장</button>
        </div>
    </template>
    <script>
        let db, records = JSON.parse(localStorage.getItem('trading_v9_master')) || [], usdtRate = 1400, watchlist = ['BTC','ETH','SOL','XRP','DOGE','PEPE','SUI','AVAX','ADA','LINK'];
        const request = indexedDB.open("TradingDB_v9", 1);
        request.onupgradeneeded = e => { e.target.result.createObjectStore("images", { keyPath: "id" }); };
        request.onsuccess = e => { db = e.target.result; renderRecords(); };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            if(event) event.target.classList.add('active');
            const sections = ['binance','other'];
            document.getElementById('view-binance').classList.toggle('active', tabId === 'binance');
            document.getElementById('view-other').classList.toggle('active', tabId !== 'binance');
            document.getElementById('sidebar-master').innerHTML = tabId === 'binance' ? document.getElementById('template-master-sidebar').innerHTML : '';
            document.getElementById('sidebar-viewer').innerHTML = tabId !== 'binance' ? document.getElementById('template-master-sidebar').innerHTML : '';
            if(tabId !== 'binance') {
                document.getElementById('globalTable').style.display = tabId === 'global' ? 'table' : 'none';
                document.getElementById('exchangeToggleBox').style.display = tabId === 'global' ? 'block' : 'none';
                document.getElementById('globalSearchBox').style.display = tabId === 'global' ? 'block' : 'none';
                if(tabId === 'global') updateGlobalPrices();
            }
        }

        async function fetchExchangeRate() {
            try {
                const res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.upbit.com/v1/ticker?markets=KRW-USDT'));
                const data = await res.json(); const ticker = JSON.parse(data.contents);
                if(ticker && ticker[0]) { usdtRate = ticker[0].trade_price; document.getElementById('liveRate').innerText = usdtRate.toLocaleString(); }
            } catch(e) { document.getElementById('liveRate').innerText = "1,400 (기본)"; }
        }

        async function updateGlobalPrices() {
            if(document.getElementById('view-other').classList.contains('active')) {
                const search = document.getElementById('globalSearch').value.toUpperCase();
                const assets = search ? [search] : watchlist;
                const upbitUrl = encodeURIComponent('https://api.upbit.com/v1/ticker?markets=' + assets.map(a => 'KRW-'+a).join(','));
                try {
                    const [bP, bF, upRes] = await Promise.all([
                        fetch('https://api.binance.com/api/v3/ticker/price').then(r => r.json()),
                        fetch('https://fapi.binance.com/fapi/v1/premiumIndex').then(r => r.json()),
                        fetch('https://api.allorigins.win/get?url=' + upbitUrl).then(r => r.json())
                    ]);
                    const upD = JSON.parse(upRes.contents) || [];
                    const body = document.getElementById('globalBody'); body.innerHTML = '';
                    assets.forEach(s => {
                        const price = parseFloat(bP.find(t => t.symbol === s+'USDT')?.price || 0);
                        const fund = (parseFloat(bF.find(f => f.symbol === s+'USDT')?.lastFundingRate || 0)*100).toFixed(4);
                        const uPrice = (upD.find && upD.find(t => t.market === 'KRW-'+s))?.trade_price || 0;
                        const kimp = (price > 0 && uPrice > 0) ? ((uPrice/usdtRate - price)/price*100).toFixed(2) : '-';
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td><b>${s}</b></td><td>${price.toLocaleString()}$ <small>(${fund}%)</small></td><td>-</td><td>-</td><td style="color:var(--gold); font-weight:700;">${uPrice ? uPrice.toLocaleString()+'원' : '-'}</td><td style="text-align:right;" class="${kimp >= 0 ? 'pnl-up' : 'pnl-down'}"><b>${kimp}%</b></td>`;
                        body.appendChild(tr);
                    });
                    applyCurrentVisibility();
                } catch(e) {}
            }
        }

        function toggleColumn(idx, id) { document.getElementById(`toggle-${id}`).classList.toggle('active'); applyCurrentVisibility(); }
        function applyCurrentVisibility() {
            const btns = document.querySelectorAll('#exchangeToggleBox .tag-btn');
            btns.forEach((btn, i) => {
                const show = btn.classList.contains('active');
                document.querySelectorAll(`#globalTable th:nth-child(${i+2}), #globalTable td:nth-child(${i+2})`).forEach(el => el.style.display = show ? '' : 'none');
                if(i === 3) document.querySelectorAll(`#globalTable th:last-child, #globalTable td:last-child`).forEach(el => el.style.display = show ? '' : 'none');
            });
        }

        function runCalc() {
            const p = Number(document.getElementById('calcPrice').value), cap = Number(document.getElementById('calcEntry').value), lev = Number(document.getElementById('calcLev').value), risk = Number(document.getElementById('calcRiskPct').value), sl = Number(document.getElementById('calcSl').value), rr = Number(document.getElementById('calcRr').value);
            if(!p || !cap) return;
            const riskAmt = cap * (risk/100), posVal = riskAmt / (sl/100), margin = posVal / lev, qty = posVal / p;
            document.getElementById('resRiskAmt').innerText = riskAmt.toFixed(2) + ' $';
            document.getElementById('resMargin').innerText = margin.toFixed(2) + ' $';
            document.getElementById('resQty').innerText = qty.toFixed(5);
            document.getElementById('resTpPrice').innerText = (p * (1 + (sl*rr/100))).toFixed(2);
            document.getElementById('resSlPrice').innerText = (p * (1 - (sl/100))).toFixed(2);
        }

        async function fetchLivePrice(t, b) {
            const asset = document.getElementById(t === 'calc_only' ? 'calcAssetName' : 'assetName').value.toUpperCase();
            if(!asset) return; b.innerText = '...';
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${asset}USDT`);
                const data = await res.json(); const price = parseFloat(data.price);
                document.getElementById(t === 'calc_only' ? 'calcPrice' : 'entryPrice').value = price.toFixed(2);
                runCalc(); updatePnlPreview();
            } catch(e) {} b.innerText = '⚡';
        }

        function addRecord() {
            const r = { id:Date.now(), asset:document.getElementById('assetName').value.toUpperCase(), side:document.querySelector('.dir-btn.active').innerText, entry:Number(document.getElementById('entryPrice').value), exit:Number(document.getElementById('exitPrice').value), qty:Number(document.getElementById('tradeQty').value), tags:[], pnl:0 };
            r.pnl = r.side === 'LONG' ? (r.exit - r.entry) * r.qty : (r.entry - r.exit) * r.qty;
            records.unshift(r); localStorage.setItem('trading_v9_master', JSON.stringify(records)); renderRecords();
        }

        function renderRecords() {
            const body = document.getElementById('dbBody'); if(!body) return; body.innerHTML = '';
            let t = 0, td = 0, start = new Date().setHours(0,0,0,0);
            records.forEach(r => {
                t += r.pnl; if(r.id >= start) td += r.pnl;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>-</td><td>${new Date(r.id).toLocaleDateString()}</td><td>${r.asset}</td><td>${r.side}</td><td>${r.entry}→${r.exit}</td><td style="text-align:right;" class="${r.pnl>=0?'pnl-up':'pnl-down'}">${r.pnl.toFixed(2)}</td><td>-</td><td><span onclick="deleteR(${r.id})">🗑️</span></td>`;
                body.appendChild(tr);
            });
            document.getElementById('statToday').innerText = td.toFixed(2) + ' $';
            document.getElementById('statTotal').innerText = t.toFixed(2) + ' $';
        }
        function deleteR(id) { records = records.filter(r => r.id !== id); localStorage.setItem('trading_v9_master', JSON.stringify(records)); renderRecords(); }
        function setDirection(d) { document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); }
        function updatePnlPreview() {
            const e = Number(document.getElementById('entryPrice').value), ex = Number(document.getElementById('exitPrice').value), q = Number(document.getElementById('tradeQty').value);
            const p = document.querySelector('.dir-btn.active').innerText === 'LONG' ? (ex-e)*q : (e-ex)*q;
            document.getElementById('pnlValue').innerText = p.toFixed(2) + ' $';
        }

        window.onload = () => { 
            fetchExchangeRate(); 
            document.getElementById('sidebar-master').innerHTML = document.getElementById('template-master-sidebar').innerHTML;
            setInterval(updateGlobalPrices, 3000);
        };
    </script>
</body>
</html>
