<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal | Magic Link Notion</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #37352f;
            --text-muted: rgba(55, 53, 47, 0.65);
            --border: #e9e9e8;
            --hover: #f1f1ef;
            --accent: #2383e2;
            --success-text: #ff5252;
            --danger-text: #3b82f6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #191919;
                --text: #d3d3d3;
                --text-muted: rgba(255, 255, 255, 0.45);
                --border: #2f2f2f;
                --hover: #2c2c2c;
                --accent: #2383e2;
                --success-text: #ff5252;
                --danger-text: #3b82f6;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Pretendard", sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.5; padding-bottom: 100px; }

        .cover { height: 180px; width: 100%; background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; position: relative; }
        .icon { font-size: 78px; margin-top: -45px; margin-bottom: 20px; display: inline-block; background: var(--bg); border-radius: 20px; }

        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 40px; margin-top: 20px; }

        /* Table Style */
        .db-title { font-size: 14px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover { background: var(--hover); }

        /* Image Embed */
        .chart-preview { width: 80px; height: 50px; border-radius: 4px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; transition: transform 0.1s; }
        .chart-preview:hover { transform: scale(1.05); }

        /* Form Style */
        .sidebar { background: var(--bg); position: sticky; top: 20px; }
        .input-card { background: var(--hover); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; }
        input, select, textarea { width: 100%; border: 1px solid var(--border); padding: 8px 12px; border-radius: 4px; background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .btn-save { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 4px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 5px; }
        
        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; padding: 40px; }
        .modal-img { max-width: 100%; max-height: 100%; border-radius: 8px; }

        .pnl-up { color: var(--success-text); }
        .pnl-down { color: var(--danger-text); }
        .badge { padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; }
        .long { background: rgba(255, 82, 82, 0.1); color: var(--success-text); }
        .short { background: rgba(59, 130, 246, 0.1); color: var(--danger-text); }
    </style>
</head>
<body>

    <div class="cover"></div>
    <div class="container">
        <span class="icon">🪄</span>
        <h1 style="margin-bottom: 10px;">트레이딩 매직 링크 데이터베이스</h1>
        <p style="color:var(--text-muted); font-size:14px; margin-bottom:40px;">트레이딩뷰 링크(Alt+S)만 붙여넣으면 사진이 자동으로 나타납니다.</p>

        <div class="main-layout">
            <!-- 일지 리스트 -->
            <div>
                <div class="db-title">📋 모든 매매 기록</div>
                <table>
                    <thead>
                        <tr>
                            <th style="width: 100px;">차트</th>
                            <th style="width: 100px;">종목</th>
                            <th style="width: 80px;">포지션</th>
                            <th style="text-align: right; width: 120px;">수익금</th>
                            <th>메모</th>
                            <th style="width: 40px;"></th>
                        </tr>
                    </thead>
                    <tbody id="dbBody"></tbody>
                </table>
                <div id="emptyMsg" style="padding: 100px; text-align: center; color: var(--text-muted);">아직 기록이 없습니다. 우측에서 첫 매매를 기록해보세요.</div>
            </div>

            <!-- 사이드바 입력 -->
            <aside class="sidebar">
                <div class="input-card">
                    <div style="font-size: 12px; font-weight: 800; margin-bottom: 20px; color: var(--text-muted);">새 기록 작성</div>
                    
                    <div class="field">
                        <label>차트 이미지 링크 (트레이딩뷰 Alt+S)</label>
                        <input type="text" id="chartUrl" placeholder="https://www.tradingview.com/x/..." oninput="previewImage()">
                        <div id="urlPreview" style="margin-top:10px; display:none;">
                            <img id="previewImg" style="width:100%; border-radius:4px; border:1px solid var(--border);">
                        </div>
                    </div>

                    <div class="field">
                        <label>종목명</label>
                        <input type="text" id="assetName" placeholder="예: BTCUSDT">
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="field">
                            <label>방향</label>
                            <select id="tradeSide">
                                <option value="LONG">LONG</option>
                                <option value="SHORT">SHORT</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>수익/손실액</label>
                            <input type="number" id="pnlAmount" placeholder="0">
                        </div>
                    </div>

                    <div class="field">
                        <label>매매 복기</label>
                        <textarea id="tradeMemo" placeholder="진입 근거와 반성..."></textarea>
                    </div>

                    <button class="btn-save" onclick="addRecord()">기록 저장하기</button>
                </div>

                <div style="display:flex; gap:10px;">
                    <button class="btn-save" style="background:var(--hover); color:var(--text); flex:1;" onclick="exportData()">백업</button>
                    <button class="btn-save" style="background:var(--hover); color:var(--text); flex:1;" onclick="takeScreenshot()">캡처</button>
                </div>
            </aside>
        </div>
    </div>

    <!-- 큰 화면 모달 -->
    <div id="imgModal" class="modal" onclick="this.style.display='none'">
        <img class="modal-img" id="modalImg">
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('trading_v6_2_records')) || [];

        function previewImage() {
            const url = document.getElementById('chartUrl').value;
            const previewDiv = document.getElementById('urlPreview');
            const previewImg = document.getElementById('previewImg');
            
            if (url && url.includes('tradingview.com/x/')) {
                // 트레이딩뷰 링크를 직접 이미지 경로로 변환 (끝에 .png를 붙이거나 썸네일 경로 사용)
                // 보통 https://www.tradingview.com/x/ABC/ 를 <img> 태그에 넣으면 바로는 안될 수 있으나
                // 실제로는 브라우저가 리다이렉션을 처리하거나 특정 규칙을 적용할 수 있음
                // 여기서는 사용자 경험을 위해 링크를 그대로 이미지 소스로 시도
                const imgUrl = url.endsWith('/') ? url.slice(0, -1) : url;
                previewImg.src = `https://www.tradingview.com/x/${imgUrl.split('/').pop()}.png`;
                previewDiv.style.display = 'block';
            } else {
                previewDiv.style.display = 'none';
            }
        }

        function addRecord() {
            const asset = document.getElementById('assetName').value.toUpperCase();
            const side = document.getElementById('tradeSide').value;
            const pnl = Number(document.getElementById('pnlAmount').value);
            const memo = document.getElementById('tradeMemo').value;
            const url = document.getElementById('chartUrl').value;

            if(!asset || !url) return alert('종목명과 차트 링크는 필수입니다!');

            const imgId = url.split('/').filter(Boolean).pop();
            const finalImgUrl = `https://www.tradingview.com/x/${imgId}.png`;

            const record = {
                id: Date.now(),
                asset, side, pnl, memo,
                image: finalImgUrl
            };

            records.unshift(record);
            localStorage.setItem('trading_v6_2_records', JSON.stringify(records));
            
            // 초기화
            document.getElementById('assetName').value = '';
            document.getElementById('pnlAmount').value = '';
            document.getElementById('tradeMemo').value = '';
            document.getElementById('chartUrl').value = '';
            document.getElementById('urlPreview').style.display = 'none';

            renderRecords();
        }

        function renderRecords() {
            const body = document.getElementById('dbBody');
            const emptyMsg = document.getElementById('emptyMsg');
            body.innerHTML = '';

            if (records.length === 0) {
                emptyMsg.style.display = 'block';
                return;
            }
            emptyMsg.style.display = 'none';

            records.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${r.image}" class="chart-preview" onclick="showModal('${r.image}')"></td>
                    <td><b>${r.asset}</b></td>
                    <td><span class="badge ${r.side === 'LONG' ? 'long' : 'short'}">${r.side}</span></td>
                    <td style="text-align:right; font-weight:700;" class="${r.pnl >= 0 ? 'pnl-up' : 'pnl-down'}">
                        ${r.pnl >= 0 ? '+' : ''}${r.pnl.toLocaleString()}
                    </td>
                    <td style="color:var(--text-muted); font-size:13px;">${r.memo.substring(0, 50)}...</td>
                    <td><span onclick="deleteRecord(${r.id})" style="cursor:pointer; opacity:0.3;">🗑️</span></td>
                `;
                body.appendChild(tr);
            });
        }

        function showModal(src) {
            const modal = document.getElementById('imgModal');
            document.getElementById('modalImg').src = src;
            modal.style.display = 'flex';
        }

        function deleteRecord(id) {
            if(confirm('이 기록을 삭제하시겠습니까?')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('trading_v6_2_records', JSON.stringify(records));
                renderRecords();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(records)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'trading_journal_backup.json'; a.click();
        }

        function takeScreenshot() {
            html2canvas(document.body, { backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a'); link.download = 'report.png'; link.href = canvas.toDataURL(); link.click();
            });
        }

        window.onload = renderRecords;
    </script>
</body>
</html>
