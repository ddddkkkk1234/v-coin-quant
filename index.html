<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트레이딩 마스터 매매일지 | Mastery Pro v7.1</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #37352f;
            --text-muted: rgba(55, 53, 47, 0.65);
            --border: #e9e9e8;
            --hover: #f1f1ef;
            --accent: #2383e2;
            --success-text: #ff5252;
            --danger-text: #3b82f6;
            --long-color: #ff5252;
            --short-color: #3b82f6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #191919;
                --text: #d3d3d3;
                --text-muted: rgba(255, 255, 255, 0.45);
                --border: #2f2f2f;
                --hover: #2c2c2c;
                --accent: #2383e2;
                --success-text: #ff5252;
                --danger-text: #3b82f6;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Pretendard", sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.5; padding-bottom: 50px; }

        .cover { height: 160px; width: 100%; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 60px; position: relative; }
        .icon { font-size: 78px; margin-top: -45px; margin-bottom: 20px; display: inline-block; background: var(--bg); border-radius: 20px; }

        .main-layout { display: grid; grid-template-columns: 1fr 380px; gap: 40px; margin-top: 20px; }

        /* DB 테이블 스타일 */
        .db-title { font-size: 14px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 12px 10px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover { background: var(--hover); }

        .chart-thumb { width: 80px; height: 50px; border-radius: 4px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; }

        /* 사이드바 & 카드 */
        .card { background: var(--hover); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .sidebar-title { font-size: 11px; font-weight: 800; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.05em; }

        /* 성과 통계 대시보드 */
        .analytics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-item { background: var(--hover); padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-item .label { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; font-weight: 700; }
        .stat-item .value { font-size: 18px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }

        /* 입력 폼 컨트롤 */
        .field { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; }
        input, select, textarea { width: 100%; border: 1px solid var(--border); padding: 8px 12px; border-radius: 4px; background: var(--bg); color: var(--text); font-size: 13px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: var(--accent); }
        textarea { height: 80px; resize: none; line-height: 1.6; }

        /* 방향 선택 버튼 */
        .direction-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .dir-btn { padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 12px; }
        .dir-btn.long.active { background: var(--long-color); color: white; border-color: var(--long-color); box-shadow: 0 4px 12px rgba(255, 82, 82, 0.3); }
        .dir-btn.short.active { background: var(--short-color); color: white; border-color: var(--short-color); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        /* 태그 버튼 */
        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .tag-btn { padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text-muted); font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .tag-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 계산기 결과 창 */
        .price-display { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 4px; margin-top: 10px; font-size: 12px; }
        .price-line { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .price-line strong { font-family: 'JetBrains Mono', monospace; }

        .btn-save { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 4px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn-fetch { padding:0 8px; background:var(--accent); color:white; border:none; border-radius:4px; cursor:pointer; font-size:12px; }

        /* 결과 색상 정의 */
        .pnl-up { color: var(--success-text); }
        .pnl-down { color: var(--danger-text); }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .long-badge { background: rgba(255, 82, 82, 0.1); color: var(--success-text); }
        .short-badge { background: rgba(59, 130, 246, 0.1); color: var(--danger-text); }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
        .modal-img { max-width: 100%; max-height: 100%; border-radius: 4px; }

        @media (max-width: 1100px) { .notion-container { padding: 0 20px 50px 20px; } .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="cover"></div>
    <div class="container">
        <span class="icon">🏆</span>
        <h1>트레이딩 마스터 매매일지 <small style="font-size: 12px; color:var(--text-muted); font-weight: 400;">v7.1 Pro</small></h1>
        
        <!-- 성과 분석 대시보드 -->
        <div class="analytics-grid">
            <div class="stat-item">
                <div class="label">총 누적 손익</div>
                <div id="statProfit" class="value pnl-up">0</div>
            </div>
            <div class="stat-item">
                <div class="label">롱(Long) 승률</div>
                <div id="statLongWin" class="value" style="color:var(--success-text)">0%</div>
            </div>
            <div class="stat-item">
                <div class="label">숏(Short) 승률</div>
                <div id="statShortWin" class="value" style="color:var(--danger-text)">0%</div>
            </div>
        </div>

        <div class="main-layout">
            <!-- 매매 히스토리 -->
            <div>
                <div class="db-title">📅 매매 복기 데이터베이스</div>
                <table id="journalTable">
                    <thead>
                        <tr>
                            <th style="width: 80px;">차트</th>
                            <th style="width: 100px;">매매 일시</th>
                            <th style="width: 100px;">종목</th>
                            <th style="width: 70px;">방향</th>
                            <th style="width: 150px;">진입 / 청산 가격</th>
                            <th style="text-align: right; width: 100px;">손익 (%)</th>
                            <th>복기 메모 및 태그</th>
                            <th style="width: 40px;"></th>
                        </tr>
                    </thead>
                    <tbody id="dbBody"></tbody>
                </table>
                <div id="emptyMsg" style="padding: 100px; text-align: center; color: var(--text-muted);">복기할 데이터가 없습니다. 원칙 매매를 시작하세요!</div>
            </div>

            <!-- 사이드바 도구함 -->
            <aside class="sidebar">
                
                <!-- 정밀 포지션 계산기 -->
                <div class="card">
                    <div class="sidebar-title">📏 정밀 포지션 계산기</div>
                    <div class="field">
                        <label>현재 기준 가격 (시세 연동)</label>
                        <div style="display:flex; gap:4px;">
                            <input type="number" id="calcPrice" placeholder="현재가" oninput="runCalc()">
                            <button onclick="fetchLivePrice('calc')" class="btn-fetch" title="현재가 불러오기">⚡</button>
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="field">
                            <label>진입 원금</label>
                            <input type="number" id="calcEntry" placeholder="0" oninput="runCalc()">
                        </div>
                        <div class="field">
                            <label>레버리지</label>
                            <input type="number" id="calcLev" value="10" oninput="runCalc()">
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="field">
                            <label>손절 %</label>
                            <input type="number" id="calcSl" value="5" oninput="runCalc()">
                        </div>
                        <div class="field">
                            <label>손익비(1:X)</label>
                            <input type="number" id="calcRr" value="2" step="0.1" oninput="runCalc()">
                        </div>
                    </div>
                    <div class="price-display">
                        <div class="price-line" style="color:var(--long-color)">
                            <span>🎯 목표 익절가:</span>
                            <strong id="priceTp">0.00</strong>
                        </div>
                        <div class="price-line" style="color:var(--short-color)">
                            <span>🛑 강제 손절가:</span>
                            <strong id="priceSl">0.00</strong>
                        </div>
                        <div class="price-line" style="margin-top:8px; border-top:1px dashed var(--border); padding-top:4px;">
                            <span>총 포지션 규모:</span>
                            <strong id="resTotal">0</strong>
                        </div>
                    </div>
                </div>

                <!-- 매매 기록 작성 -->
                <div class="card">
                    <div class="sidebar-title">📝 매매 기록 작성</div>
                    
                    <div class="field">
                        <label>방향 선택</label>
                        <div class="direction-group">
                            <button class="dir-btn long active" id="btnLong" onclick="setDirection('LONG')">LONG / 매수</button>
                            <button class="dir-btn short" id="btnShort" onclick="setDirection('SHORT')">SHORT / 매도</button>
                        </div>
                    </div>

                    <div class="field">
                        <label>매매 시각</label>
                        <input type="datetime-local" id="tradeDate">
                    </div>

                    <div class="field" id="pasteZone" style="border:2px dashed var(--border); height:80px; display:flex; align-items:center; justify-content:center; font-size:11px; cursor:pointer; background-size:cover; color:var(--text-muted);">
                        📸 차트 이미지 붙여넣기 (Ctrl+V)
                    </div>

                    <div class="field">
                        <label>종목 검색</label>
                        <input type="text" id="assetName" list="assetList" placeholder="예: BTC, ETH" onchange="fetchLivePrice('all')">
                        <datalist id="assetList"></datalist>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="field">
                            <label>진입 가격</label>
                            <div style="display:flex; gap:4px;">
                                <input type="number" id="entryPrice" placeholder="0" style="flex:1;">
                                <button onclick="fetchLivePrice('all')" class="btn-fetch" title="시세 불러오기">⚡</button>
                            </div>
                        </div>
                        <div class="field">
                            <label>청산 가격 (매매 종료)</label>
                            <input type="number" id="exitPrice" placeholder="0">
                        </div>
                    </div>

                    <div class="field">
                        <label>수량 (Qty)</label>
                        <input type="number" id="tradeQty" step="any" placeholder="1.0">
                    </div>

                    <div class="field">
                        <label>복기 메모 및 태그</label>
                        <textarea id="tradeMemo" placeholder="진입 이유와 반성 내용을 기록하세요..."></textarea>
                        <div class="tag-group" id="tagSelector">
                            <span class="tag-btn" onclick="toggleTag(this)">원칙매매</span>
                            <span class="tag-btn" onclick="toggleTag(this)">뇌동매매</span>
                            <span class="tag-btn" onclick="toggleTag(this)">FOMO</span>
                            <span class="tag-btn" onclick="toggleTag(this)">추격매매</span>
                            <span class="tag-btn" onclick="toggleTag(this)">익절</span>
                            <span class="tag-btn" onclick="toggleTag(this)">손절</span>
                        </div>
                    </div>
                    <button class="btn-save" onclick="addRecord()">기록 저장 및 분석</button>
                </div>

                <div style="display:flex; gap:10px;">
                    <button class="btn-save" style="background:var(--hover); color:var(--text); flex:1; font-size:12px;" onclick="exportData()">데이터 백업</button>
                    <button class="btn-save" style="background:var(--hover); color:var(--text); flex:1; font-size:12px;" onclick="takeScreenshot()">리포트 캡처</button>
                </div>
            </aside>
        </div>
    </div>

    <div id="imgModal" class="modal" onclick="this.style.display='none'">
        <img class="modal-img" id="modalImg">
    </div>

    <script>
        let db;
        const request = indexedDB.open("MasterJournalDB_v7_1", 1);
        request.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("images", { keyPath: "id" }); };
        request.onsuccess = e => { db = e.target.result; renderRecords(); };

        let records = JSON.parse(localStorage.getItem('trading_v7_1_master')) || [];
        let tempImageData = null;
        let currentDirection = 'LONG';

        function initTime() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('tradeDate').value = now.toISOString().slice(0, 16);
        }

        function setDirection(dir) {
            currentDirection = dir;
            document.getElementById('btnLong').classList.toggle('active', dir === 'LONG');
            document.getElementById('btnShort').classList.toggle('active', dir === 'SHORT');
        }

        function toggleTag(el) { el.classList.toggle('active'); }

        function runCalc() {
            const base = Number(document.getElementById('calcPrice').value) || 0;
            const entry = Number(document.getElementById('calcEntry').value) || 0;
            const lev = Number(document.getElementById('calcLev').value) || 0;
            const sl = Number(document.getElementById('calcSl').value) || 0;
            const rr = Number(document.getElementById('calcRr').value) || 2;

            if (base > 0) {
                // 계산기는 롱 기준으로 목표가 제시 (트레이더의 판단 기준)
                document.getElementById('priceSl').innerText = (base * (1 - sl/100)).toLocaleString();
                document.getElementById('priceTp').innerText = (base * (1 + (sl*rr)/100)).toLocaleString();
            }
            document.getElementById('resTotal').innerText = (entry * lev).toLocaleString();
        }

        async function fetchLivePrice(target) {
            const asset = document.getElementById('assetName').value.trim().toUpperCase();
            if (!asset) return alert('종목명을 입력하세요.');
            const symbol = asset.endsWith('USDT') ? asset : asset + 'USDT';
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
                const data = await res.json();
                const price = parseFloat(data.price);
                
                if (target === 'calc') {
                    document.getElementById('calcPrice').value = price;
                } else {
                    document.getElementById('entryPrice').value = price;
                    document.getElementById('calcPrice').value = price; // 동기화
                }
                runCalc();
            } catch (err) { alert('시세 로드 실패. 종목을 확인하세요.'); }
        }

        async function fetchSymbols() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/exchangeInfo');
                const data = await res.json();
                const list = document.getElementById('assetList');
                data.symbols.filter(s => s.symbol.endsWith('USDT')).forEach(s => {
                    const option = document.createElement('option');
                    option.value = s.symbol.replace('USDT', '');
                    list.appendChild(option);
                });
            } catch (err) {}
        }

        document.addEventListener('paste', e => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) if (item.kind === 'file') handleImage(item.getAsFile());
        });

        function handleImage(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200;
                    let w = img.width; let h = img.height;
                    if (w > MAX_WIDTH) { h *= MAX_WIDTH / w; w = MAX_WIDTH; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    tempImageData = canvas.toDataURL('image/jpeg', 0.8);
                    const zone = document.getElementById('pasteZone');
                    zone.style.backgroundImage = `url(${tempImageData})`;
                    zone.innerText = '';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function addRecord() {
            const time = document.getElementById('tradeDate').value;
            const asset = document.getElementById('assetName').value.toUpperCase();
            const side = currentDirection;
            const entry = Number(document.getElementById('entryPrice').value);
            const exit = Number(document.getElementById('exitPrice').value);
            const qty = Number(document.getElementById('tradeQty').value);
            const memo = document.getElementById('tradeMemo').value;
            const tags = Array.from(document.querySelectorAll('.tag-btn.active')).map(b => b.innerText);

            if(!asset || !entry || !exit) return alert('종목, 진입가, 청산가는 필수입니다.');

            let yieldPct = side === 'LONG' ? ((exit - entry) / entry) * 100 : ((entry - exit) / entry) * 100;
            let pnl = yieldPct * entry * qty / 100;

            const id = new Date(time).getTime();
            const record = { id, asset, side, entry, exit, qty, memo, tags, pnl, yieldPct, hasImage: !!tempImageData };

            if (tempImageData) {
                const tx = db.transaction("images", "readwrite");
                tx.objectStore("images").add({ id, data: tempImageData });
            }

            records.unshift(record);
            localStorage.setItem('trading_v7_1_master', JSON.stringify(records));
            
            // 초기화
            document.getElementById('assetName').value = '';
            document.getElementById('entryPrice').value = '';
            document.getElementById('exitPrice').value = '';
            document.getElementById('tradeMemo').value = '';
            document.getElementById('pasteZone').style.backgroundImage = 'none';
            document.getElementById('pasteZone').innerText = '📸 붙여넣기 (Ctrl+V)';
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            tempImageData = null;
            initTime();
            renderRecords();
        }

        async function renderRecords() {
            const body = document.getElementById('dbBody');
            body.innerHTML = '';
            if (records.length === 0) { document.getElementById('emptyMsg').style.display = 'block'; return; }
            document.getElementById('emptyMsg').style.display = 'none';

            let totalP = 0; let lWin = 0; let lTotal = 0; let sWin = 0; let sTotal = 0;

            for (let r of records) {
                totalP += r.pnl;
                if (r.side === 'LONG') { lTotal++; if(r.pnl > 0) lWin++; }
                else { sTotal++; if(r.pnl > 0) sWin++; }

                const d = new Date(r.id);
                const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                
                let imgHtml = '—';
                if (r.hasImage) {
                    const img = await getImg(r.id);
                    if (img) imgHtml = `<img src="${img}" class="chart-thumb" onclick="showModal('${img}')">`;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${imgHtml}</td>
                    <td style="color:var(--text-muted); font-size:11px;">${dateStr}</td>
                    <td><b>${r.asset}</b></td>
                    <td><span class="badge ${r.side === 'LONG' ? 'long-badge' : 'short-badge'}">${r.side}</span></td>
                    <td style="font-family:'JetBrains Mono'; font-size:11px;">${r.entry.toLocaleString()} → ${r.exit.toLocaleString()}</td>
                    <td style="text-align:right; font-weight:700;" class="${r.pnl >= 0 ? 'pnl-up' : 'pnl-down'}">
                        ${r.pnl >= 0 ? '+' : ''}${r.pnl.toLocaleString()}<br><small>${r.yieldPct.toFixed(2)}%</small>
                    </td>
                    <td>
                        <div style="font-size:12px; margin-bottom:4px;">${r.memo}</div>
                        ${r.tags.map(t => `<span style="font-size:10px; padding:1px 4px; background:var(--hover); border-radius:3px; margin-right:4px;">#${t}</span>`).join('')}
                    </td>
                    <td><span onclick="deleteRecord(${r.id})" style="cursor:pointer; opacity:0.3;">🗑️</span></td>
                `;
                body.appendChild(tr);
            }

            document.getElementById('statProfit').innerText = (totalP >= 0 ? '+' : '') + totalP.toLocaleString();
            document.getElementById('statProfit').className = 'value ' + (totalP >= 0 ? 'pnl-up' : 'pnl-down');
            document.getElementById('statLongWin').innerText = lTotal > 0 ? ((lWin/lTotal)*100).toFixed(1) + '%' : '0%';
            document.getElementById('statShortWin').innerText = sTotal > 0 ? ((sWin/sTotal)*100).toFixed(1) + '%' : '0%';
        }

        function getImg(id) { return new Promise(res => { if(!db) return res(null); const tx = db.transaction("images", "readonly"); const req = tx.objectStore("images").get(id); req.onsuccess = e => res(e.target.result ? e.target.result.data : null); }); }
        function showModal(src) { document.getElementById('modalImg').src = src; document.getElementById('imgModal').style.display = 'flex'; }
        
        function deleteRecord(id) {
            if(confirm('이 기록을 삭제하시겠습니까?')) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('trading_v7_1_master', JSON.stringify(records));
                if(db) { const tx = db.transaction("images", "readwrite"); tx.objectStore("images").delete(id); }
                renderRecords();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(records)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = '매매일지_백업.json'; a.click();
        }

        function takeScreenshot() {
            html2canvas(document.body, { backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a'); link.download = '매매분석_리포트.png'; link.href = canvas.toDataURL(); link.click();
            });
        }

        window.onload = () => { initTime(); runCalc(); fetchSymbols(); };
    </script>
</body>
</html>
