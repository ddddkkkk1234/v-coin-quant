<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal | Notion Style</title>
    <!-- Notion 감성 폰트: Inter & Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #191919; /* Notion Dark Background */
            --text: #ffffff;
            --text-muted: #9b9b9b;
            --border: #2f2f2f;
            --hover: #2c2c2c;
            --accent: #38bdf8;
            --success: #ff5252; /* K-Red */
            --danger: #3b82f6;  /* K-Blue */
            --card: #191919;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Pretendard", sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Notion 스타일 중앙 정렬 컨테이너 */
        .notion-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        /* 커버 이미지 대용 상단 바 */
        .page-header {
            margin-bottom: 40px;
        }

        .page-emoji {
            font-size: 78px;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        .page-description {
            color: var(--text-muted);
            font-size: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 30px;
            margin-bottom: 40px;
        }

        /* 섹션 구분 */
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 40px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 그리드 레이아웃 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background-color: var(--border);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .stat-item {
            background-color: var(--bg);
            padding: 20px;
            text-align: center;
        }

        .stat-item span {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-item strong {
            font-size: 24px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* 입력 폼 (Notion Block Style) */
        .input-block {
            background: transparent;
            border-left: 3px solid var(--border);
            padding-left: 20px;
            margin-bottom: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input, select, textarea {
            width: 100%;
            background: var(--hover);
            border: 1px solid transparent;
            padding: 10px 12px;
            border-radius: 4px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        input:focus, textarea:focus {
            background: var(--bg);
            border-color: var(--border);
        }

        .btn-add {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-add:hover {
            opacity: 0.9;
        }

        /* 저널 리스트 (Notion List View Style) */
        .journal-item {
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 100px 1fr 150px;
            gap: 20px;
            align-items: center;
        }

        .journal-item:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .item-date { font-size: 12px; color: var(--text-muted); }
        .item-title { font-weight: 600; font-size: 15px; }
        .item-memo { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .item-pnl { text-align: right; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .tag {
            font-size: 11px;
            background-color: #262626;
            padding: 2px 6px;
            border-radius: 3px;
            color: var(--text-muted);
            margin-right: 4px;
        }

        .pnl-plus { color: var(--success); }
        .pnl-minus { color: var(--danger); }

        /* 상단 플로팅 컨트롤 */
        .floating-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .mini-btn {
            background: var(--hover);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .mini-btn.active { color: var(--text); border-color: var(--text-muted); }

        /* 차트 */
        .chart-box {
            margin-bottom: 40px;
            height: 200px;
        }
    </style>
</head>
<body id="captureArea">

    <div class="floating-controls no-print">
        <button class="mini-btn active" id="btnKR" onclick="setLang('ko')">한국어</button>
        <button class="mini-btn" id="btnEN" onclick="setLang('en')">English</button>
        <span style="color:var(--border)">|</span>
        <button class="mini-btn" onclick="takeScreenshot()">캡처</button>
        <button class="mini-btn" onclick="exportData()">JSON</button>
    </div>

    <div class="notion-page">
        <div class="page-header">
            <span class="page-emoji">🚀</span>
            <h1 id="ui-title">트레이딩 복기 일지</h1>
            <p class="page-description" id="ui-desc">뇌동매매를 멈추고 시스템 트레이딩으로 나아가는 완벽한 기록 공간.</p>
        </div>

        <div class="section-title">📊 <span id="ui-stats-title">성과 요약</span></div>
        <div class="stats-grid">
            <div class="stat-item">
                <span id="ui-net-pnl">총 손익</span>
                <strong id="statProfit" class="pnl-plus">0</strong>
            </div>
            <div class="stat-item">
                <span id="ui-win-rate">승률</span>
                <strong id="statWinRate">0%</strong>
            </div>
            <div class="stat-item">
                <span id="ui-total-trades">매매 횟수</span>
                <strong id="statCount">0</strong>
            </div>
        </div>

        <div class="chart-box">
            <canvas id="pnlChart"></canvas>
        </div>

        <div class="section-title">✍️ <span id="ui-new-title">새 매매 일기</span></div>
        <div class="input-block">
            <div class="form-row">
                <div>
                    <label id="ui-asset">자산 종목</label>
                    <input type="text" id="assetName" placeholder="BTC, ETH...">
                </div>
                <div>
                    <label id="ui-side">포지션</label>
                    <select id="tradeType">
                        <option value="LONG">LONG (BUY)</option>
                        <option value="SHORT">SHORT (SELL)</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label id="ui-entry">진입 가격</label>
                    <input type="number" id="entryPrice" placeholder="0.00">
                </div>
                <div>
                    <label id="ui-exit">청산 가격</label>
                    <input type="number" id="exitPrice" placeholder="0.00">
                </div>
            </div>
            <div class="field" style="margin-bottom: 15px;">
                <label id="ui-qty">수량</label>
                <input type="number" id="tradeQuantity" step="any" placeholder="0.00">
            </div>
            <div class="field">
                <label id="ui-memo">매매 근거 및 반성</label>
                <textarea id="tradeMemo" placeholder="이 매매를 진행한 핵심 이유와 잘한 점/잘못한 점을 기록하세요..."></textarea>
            </div>
            <button class="btn-add" id="ui-save-btn" onclick="addRecord()">일지에 추가하기</button>
        </div>

        <div class="section-title">📖 <span id="ui-history-title">최근 기록</span></div>
        <div id="journalContainer">
            <!-- Records -->
        </div>
    </div>

    <script>
        const i18n = {
            ko: {
                title: "트레이딩 복기 일지", desc: "뇌동매매를 멈추고 시스템 트레이딩으로 나아가는 완벽한 기록 공간.",
                statsTitle: "성과 요약", newTitle: "새 매매 일기", historyTitle: "최근 기록",
                netPnl: "총 손익", winRate: "승률", totalTrades: "매매 횟수",
                asset: "자산 종목", side: "포지션", entry: "진입 가격", exit: "청산 가격", qty: "수량",
                memo: "매매 근거 및 반성", saveBtn: "일지에 추가하기",
                placeholderMemo: "이 매매를 진행한 핵심 이유와 잘한 점/잘못한 점을 기록하세요...",
                alert: "모든 내용을 채워야 완벽한 복기가 됩니다!", confirmDel: "삭제하시겠습니까?"
            },
            en: {
                title: "Trading Journal", desc: "The perfect space to stop impulsive trading and move toward systematic growth.",
                statsTitle: "Performance Summary", newTitle: "Log New Trade", historyTitle: "Recent Logs",
                netPnl: "Net PNL", winRate: "Win Rate", totalTrades: "Total Trades",
                asset: "Asset", side: "Position", entry: "Entry Price", exit: "Exit Price", qty: "Quantity",
                memo: "Entry Reason & Review", saveBtn: "Add to Journal",
                placeholderMemo: "Why did you enter? Lessons learned...",
                alert: "Please fill all fields for a perfect review!", confirmDel: "Delete this record?"
            }
        };

        let currentLang = 'ko';
        let records = JSON.parse(localStorage.getItem('notion_trading_records')) || [];
        let pnlChart = null;

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('btnKR').classList.toggle('active', lang === 'ko');
            document.getElementById('btnEN').classList.toggle('active', lang === 'en');
            
            const texts = i18n[lang];
            document.getElementById('ui-title').innerText = texts.title;
            document.getElementById('ui-desc').innerText = texts.desc;
            document.getElementById('ui-stats-title').innerText = texts.statsTitle;
            document.getElementById('ui-new-title').innerText = texts.newTitle;
            document.getElementById('ui-history-title').innerText = texts.historyTitle;
            document.getElementById('ui-net-pnl').innerText = texts.netPnl;
            document.getElementById('ui-win-rate').innerText = texts.winRate;
            document.getElementById('ui-total-trades').innerText = texts.totalTrades;
            document.getElementById('ui-asset').innerText = texts.asset;
            document.getElementById('ui-side').innerText = texts.side;
            document.getElementById('ui-entry').innerText = texts.entry;
            document.getElementById('ui-exit').innerText = texts.exit;
            document.getElementById('ui-qty').innerText = texts.qty;
            document.getElementById('ui-memo').innerText = texts.memo;
            document.getElementById('ui-save-btn').innerText = texts.saveBtn;
            document.getElementById('tradeMemo').placeholder = texts.placeholderMemo;

            renderRecords();
        }

        function formatCurrency(val) {
            return Number(val).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
        }

        function addRecord() {
            const asset = document.getElementById('assetName').value.toUpperCase();
            const type = document.getElementById('tradeType').value;
            const entry = Number(document.getElementById('entryPrice').value);
            const exit = Number(document.getElementById('exitPrice').value);
            const qty = Number(document.getElementById('tradeQuantity').value);
            const memo = document.getElementById('tradeMemo').value;

            if(!asset || !entry || !exit || !qty || !memo) return alert(i18n[currentLang].alert);

            const pnl = type === 'LONG' ? (exit - entry) * qty : (entry - exit) * qty;
            const record = { id: Date.now(), asset, type, entry, exit, qty, memo, pnl };

            records.unshift(record);
            localStorage.setItem('notion_trading_records', JSON.stringify(records));
            
            // Reset
            document.getElementById('assetName').value = '';
            document.getElementById('entryPrice').value = '';
            document.getElementById('exitPrice').value = '';
            document.getElementById('tradeQuantity').value = '';
            document.getElementById('tradeMemo').value = '';

            renderRecords();
        }

        function deleteRecord(id) {
            if(confirm(i18n[currentLang].confirmDel)) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('notion_trading_records', JSON.stringify(records));
                renderRecords();
            }
        }

        function renderRecords() {
            const container = document.getElementById('journalContainer');
            container.innerHTML = '';

            let totalP = 0; let wins = 0;
            records.forEach(r => {
                totalP += r.pnl; if(r.pnl > 0) wins++;
                const d = new Date(r.id);
                const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                
                const item = document.createElement('div');
                item.className = 'journal-item';
                item.innerHTML = `
                    <div class="item-date">${dateStr}</div>
                    <div>
                        <div class="item-title">
                            <span style="color:${r.type === 'LONG' ? 'var(--success)' : 'var(--danger)'}; margin-right:8px;">${r.type}</span>
                            ${r.asset}
                        </div>
                        <div class="item-memo">${r.memo.replace(/\n/g, '<br>')}</div>
                        <div style="margin-top:6px; font-size:11px; color:var(--text-muted);">
                            Price: ${formatCurrency(r.entry)} → ${formatCurrency(r.exit)} | Qty: ${r.qty}
                        </div>
                    </div>
                    <div class="item-pnl">
                        <div class="${r.pnl > 0 ? 'pnl-plus' : 'pnl-minus'}">${r.pnl > 0 ? '+' : ''}${formatCurrency(r.pnl)}</div>
                        <span onclick="deleteRecord(${r.id})" style="font-size:10px; color:var(--border); cursor:pointer; text-decoration:underline;">Delete</span>
                    </div>
                `;
                container.appendChild(item);
            });

            document.getElementById('statProfit').innerText = formatCurrency(totalP);
            document.getElementById('statProfit').className = totalP >= 0 ? 'pnl-plus' : 'pnl-minus';
            document.getElementById('statWinRate').innerText = records.length > 0 ? ((wins/records.length)*100).toFixed(1) + '%' : '0%';
            document.getElementById('statCount').innerText = records.length;

            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('pnlChart').getContext('2d');
            const sorted = [...records].sort((a,b) => a.id - b.id);
            let cum = 0; const data = sorted.map(r => { cum += r.pnl; return cum; });
            if (pnlChart) pnlChart.destroy();
            pnlChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Start', ...sorted.map((_, i) => i + 1)],
                    datasets: [{
                        data: [0, ...data],
                        borderColor: '#ffffff',
                        borderWidth: 1.5,
                        pointRadius: 0,
                        tension: 0.2,
                        fill: false
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }, 
                            ticks: { color: '#6b7280', font: { size: 9 } } 
                        }
                    }
                }
            });
        }

        function takeScreenshot() {
            html2canvas(document.getElementById('captureArea'), { backgroundColor: '#191919' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `trading_notion_report_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(records)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'journal_data.json';
            a.click();
        }

        window.onload = () => setLang('ko');
    </script>
</body>
</html>
