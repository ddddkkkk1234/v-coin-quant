<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-LOG | 실시간 김프 & AI 매매일지</title>
    
    <!-- Google Fonts & Icons -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- External Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <style>
        :root {
            --bg: #05070a;
            --card-bg: #0f172a;
            --nav-bg: #0f172a;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #1e293b;
            --accent: #00f2ff;
            --success: #22c55e;
            --danger: #ef4444;
            --ai-gradient: linear-gradient(135deg, #00f2ff 0%, #3b82f6 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Pretendard", sans-serif; }
        body { background-color: var(--bg); color: var(--text); font-size: 13px; overflow-x: hidden; }

        /* 1. 상단 티커 바 (TradingView Widget) */
        .top-ticker-bar { 
            background: #000; 
            border-bottom: 1px solid var(--border); 
            height: 40px;
            overflow: hidden;
        }

        /* 2. 메인 네비게이션 */
        header { 
            background: var(--nav-bg); 
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            backdrop-filter: blur(10px); 
        }
        .nav-container { 
            max-width: 1700px; 
            margin: 0 auto; 
            padding: 0 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            height: 65px; 
        }
        .logo { 
            font-size: 26px; 
            font-weight: 900; 
            background: var(--ai-gradient); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: -1.5px; 
            cursor: pointer;
        }
        .main-menu { display: flex; gap: 20px; align-items: center; margin-left: 40px; }
        .menu-item { 
            color: var(--text-muted); 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 13.5px; 
            transition: 0.3s; 
            padding: 22px 0; 
            border-bottom: 2px solid transparent; 
            white-space: nowrap;
        }
        .menu-item:hover, .menu-item.active { color: var(--accent); border-bottom-color: var(--accent); }
        .menu-item i { margin-right: 6px; font-size: 12px; }

        .header-right { display: flex; align-items: center; gap: 20px; }
        .utility-icons { 
            display: flex; 
            align-items: center; 
            gap: 18px; 
            font-size: 18px; 
            color: var(--text-muted); 
            border-left: 1px solid var(--border); 
            padding-left: 20px; 
        }
        .u-icon { cursor: pointer; transition: 0.2s; }
        .u-icon:hover { color: var(--accent); }
        .u-text { font-size: 11px; font-weight: 700; cursor: pointer; }

        /* 3. 레이아웃 구조 (3단) */
        .main-container { 
            max-width: 1700px; 
            margin: 20px auto; 
            display: grid; 
            grid-template-columns: 280px 1fr 340px; 
            gap: 20px; 
            padding: 0 20px; 
        }

        /* 왼쪽 사이드바 (광고/지표) */
        .left-area { display: flex; flex-direction: column; gap: 20px; }
        
        /* 중앙 컨텐츠 (테이블/차트) */
        .center-area { min-width: 0; }

        /* 오른쪽 사이드바 (매매일지 워크스테이션) */
        .right-area { display: flex; flex-direction: column; gap: 20px; position: sticky; top: 85px; height: calc(100vh - 110px); }

        /* 4. 공통 카드 스타일 */
        .pro-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
        }
        .card-header { 
            padding: 12px 15px; 
            font-weight: 800; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255,255,255,0.02); 
            font-size: 12px;
            color: var(--accent);
        }
        .card-body { padding: 15px; }

        /* 5. 매매일지/계산기 스타일 */
        input, select { 
            width: 100%; 
            background: #05070a; 
            border: 1px solid var(--border); 
            padding: 8px 12px; 
            border-radius: 6px; 
            color: var(--text); 
            font-size: 12px; 
            margin-bottom: 8px; 
            outline: none; 
        }
        .btn-accent { 
            background: var(--ai-gradient); 
            color: #000; 
            border: none; 
            padding: 10px; 
            border-radius: 6px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .btn-accent:hover { opacity: 0.9; transform: translateY(-1px); }

        /* 6. 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.3); padding: 10px; text-align: left; color: var(--text-muted); font-size: 11px; }
        td { padding: 10px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }
        .coin-icon { width: 20px; height: 20px; border-radius: 50%; vertical-align: middle; margin-right: 8px; }

        /* 7. 트롤박스 (채팅) */
        .trollbox { flex: 1; display: flex; flex-direction: column; min-height: 200px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; line-height: 1.5; }
        .chat-msg { margin-bottom: 8px; }
        .chat-msg b { color: var(--accent); }
        .chat-input-area { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 5px; }

        .pnl-up { color: var(--success); }
        .pnl-down { color: var(--danger); }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body>

    <!-- 1. 실시간 티커 바 -->
    <div class="top-ticker-bar">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    {"proName": "BINANCE:BTCUSDT", "title": "비트코인"},
                    {"proName": "BINANCE:ETHUSDT", "title": "이더리움"},
                    {"proName": "BINANCE:XRPUSDT", "title": "리플"},
                    {"proName": "BINANCE:SOLUSDT", "title": "솔라나"},
                    {"proName": "FX_IDC:USDKRW", "title": "원/달러 환율"},
                    {"proName": "CRYPTOCAP:BTC.D", "title": "BTC 점유율"},
                    {"proName": "NASDAQ:IXIC", "title": "나스닥100"}
                ],
                "showSymbolLogo": true, "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "ko"
            }
            </script>
        </div>
    </div>

    <!-- 2. 네비게이션 -->
    <header>
        <div class="nav-container">
            <div style="display:flex; align-items:center;">
                <div class="logo" onclick="location.reload()">K-LOG</div>
                <nav class="main-menu">
                    <div class="menu-item active" id="m-coin" onclick="switchView('coin')">암호화폐</div>
                    <div class="menu-item" id="m-longshort" onclick="switchView('longshort')">롱-숏</div>
                    <div class="menu-item" id="m-ranking" onclick="switchView('ranking')">실시간 순위</div>
                    <div class="menu-item" id="m-stock" onclick="switchView('stock')">주식</div>
                    <div class="menu-item" id="m-news" onclick="switchView('news')">뉴스</div>
                    <div class="menu-item" id="m-calendar" onclick="switchView('calendar')">경제 캘린더</div>
                    <div class="menu-item" id="m-analysis" onclick="switchView('analysis')"><i class="fa-solid fa-wand-magic-sparkles"></i> AI 시황분석</div>
                    <div class="menu-item" id="m-journal" onclick="switchView('journal')"><i class="fa-solid fa-book"></i> 매매일지</div>
                </nav>
            </div>
            <div class="header-right">
                <div class="utility-icons">
                    <span class="u-text">내정보</span>
                    <i class="fa-solid fa-gear u-icon" title="환경설정"></i>
                    <i class="fa-solid fa-circle-user u-icon" style="font-size: 22px;" title="로그인"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- [왼쪽] 지표 및 광고 -->
        <aside class="left-area">
            <div class="pro-card">
                <div class="card-header">📊 시장 요약</div>
                <div class="card-body" style="padding:0;">
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                        {
                          "colorTheme": "dark", "dateRange": "12M", "showChart": true, "locale": "ko",
                          "largeChartUrl": "", "isTransparent": true, "showSymbolLogo": true, "showFloatingTooltip": false,
                          "width": "100%", "height": "400",
                          "tabs": [
                            { "title": "코인", "symbols": [{ "s": "BINANCE:BTCUSDT" }, { "s": "BINANCE:ETHUSDT" }, { "s": "BINANCE:SOLUSDT" }] }
                          ]
                        }
                        </script>
                    </div>
                </div>
            </div>
            <div class="pro-card" style="height:300px; display:flex; align-items:center; justify-content:center; color:var(--text-muted);">
                광고 영역
            </div>
        </aside>

        <!-- [중앙] 메인 컨텐츠 -->
        <main class="center-area">
            <div id="view-coin" class="view-section active">
                <div class="pro-card" style="margin-bottom:20px; height:450px;">
                    <div id="tv_chart_container" style="height:100%; width:100%"></div>
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <div style="font-size:14px; font-weight:800; color:var(--accent);">🌐 실시간 프리미엄 시황</div>
                    <input type="text" id="globalSearch" placeholder="코인명/심볼 검색..." style="width:200px; margin-bottom:0;">
                </div>

                <div class="pro-card">
                    <table>
                        <thead>
                            <tr><th>코인</th><th>업비트</th><th>김프</th><th>바이낸스</th><th>전일대비</th><th style="text-align:right;">거래대금</th></tr>
                        </thead>
                        <tbody id="globalBody">
                            <tr><td colspan="6" style="text-align:center; padding:50px;">데이터 로딩 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 다른 탭들 (뉴스, 주식 등) 자리 -->
            <div id="view-news" class="view-section"><div class="pro-card" style="padding:50px; text-align:center;">최신 코인 뉴스를 불러오는 중...</div></div>
            <div id="view-stock" class="view-section"><div class="pro-card" style="padding:50px; text-align:center;">미국/국내 주식 시황 준비 중...</div></div>
        </main>

        <!-- [오른쪽] 매매일지 워크스테이션 -->
        <aside class="right-area">
            <!-- 1. 리스크 계산기 -->
            <div class="pro-card">
                <div class="card-header">📐 리스크 계산기</div>
                <div class="card-body">
                    <input type="text" id="calcAssetName" placeholder="종목 심볼 (예: BTC)" list="assetList">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                        <input type="number" id="calcPrice" placeholder="현재가 ($)">
                        <input type="number" id="calcLev" value="10" title="레버리지">
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                        <input type="number" id="calcEntry" placeholder="투자금 ($)">
                        <input type="number" id="calcSl" value="5" title="손절라인(%)">
                    </div>
                    <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:6px; margin-bottom:10px;">
                        <div style="display:flex; justify-content:space-between; font-size:11px;">
                            <span>추천 수량:</span><b id="resQty" style="color:var(--accent);">0.00</b>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:11px; margin-top:5px;">
                            <span>필요 증거금:</span><b id="resMargin">0.00 $</b>
                        </div>
                    </div>
                    <button class="btn-accent" onclick="applyToLog()">매매 기록에 적용</button>
                </div>
            </div>

            <!-- 2. 매매일지 입력 -->
            <div class="pro-card">
                <div class="card-header">📝 퀵 매매로그</div>
                <div class="card-body">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                        <input type="number" id="entryPrice" placeholder="진입가">
                        <input type="number" id="exitPrice" placeholder="청산가">
                    </div>
                    <input type="number" id="tradeQty" placeholder="수량">
                    <div style="text-align:center; font-weight:900; font-size:16px; margin:5px 0;" id="pnlValue">0.00 $</div>
                    <button class="btn-accent" onclick="addRecord()">로그 저장하기</button>
                </div>
            </div>

            <!-- 3. 트롤박스 (채팅) -->
            <div class="pro-card trollbox">
                <div class="card-header">💬 트롤박스 (실시간)</div>
                <div class="chat-messages" id="chatBox">
                    <div class="chat-msg"><b>운영자:</b> K-LOG v2에 오신 것을 환영합니다!</div>
                    <div class="chat-msg"><b>고래형:</b> 오늘 김프 3% 넘었네요 ㄷㄷ</div>
                    <div class="chat-msg"><b>단타왕:</b> 나스닥 반등 가즈아~</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="메시지 입력..." style="margin-bottom:0;">
                    <button style="background:var(--accent); border:none; padding:5px 10px; border-radius:6px; cursor:pointer;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </aside>
    </div>

    <datalist id="assetList"></datalist>

    <script>
        // 기초 데이터 및 로직
        let krwMarkets = [], binancePrices = {}, tickerData = {}, usdtRate = 1467;
        let records = JSON.parse(localStorage.getItem('klog_records')) || [];

        function switchView(v) {
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`m-${v}`).classList.add('active');
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(`view-${v}`);
            if(target) target.classList.add('active');
        }

        function loadChart(symbol, exchange = 'upbit') {
            const chartSymbol = exchange === 'upbit' ? `UPBIT:${symbol}KRW` : `BINANCE:${symbol}USDT`;
            new TradingView.widget({
                "autosize": true, "symbol": chartSymbol, "interval": "60", "timezone": "Asia/Seoul",
                "theme": "dark", "style": "1", "locale": "ko", "container_id": "tv_chart_container"
            });
        }

        async function init() {
            try {
                // 환율 정보
                const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.upbit.com/v1/ticker?markets=KRW-USDT'));
                const rj = await r.json(); usdtRate = JSON.parse(rj.contents)[0].trade_price;

                // 마켓 정보
                const m = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.upbit.com/v1/market/all'));
                const mj = await m.json(); krwMarkets = JSON.parse(mj.contents).filter(x => x.market.startsWith('KRW-'));

                // 바이낸스 가격
                const b = await fetch('https://api.binance.com/api/v3/ticker/price');
                const bj = await b.json(); bj.forEach(p => { if(p.symbol.endsWith('USDT')) binancePrices[p.symbol.replace('USDT','')] = parseFloat(p.price); });

                connectWebSocket();
                renderTable();
                loadChart('BTC');
            } catch(e) { console.error(e); }
        }

        function connectWebSocket() {
            const socket = new WebSocket('wss://api.upbit.com/websocket/v1');
            socket.onopen = () => { socket.send(JSON.stringify([{"ticket":"test"},{"type":"ticker","codes":krwMarkets.map(m => m.market)}])); };
            socket.onmessage = async (e) => { const data = JSON.parse(await e.data.text()); tickerData[data.code] = data; };
        }

        function renderTable() {
            const body = document.getElementById('globalBody');
            if(!body || !document.getElementById('view-coin').classList.contains('active')) { setTimeout(renderTable, 1000); return; }
            
            const search = document.getElementById('globalSearch').value.toUpperCase();
            let html = '';

            krwMarkets.forEach(m => {
                const t = tickerData[m.market];
                const symbol = m.market.replace('KRW-', '');
                if(search && !symbol.includes(search) && !m.korean_name.includes(search)) return;
                if(!t) return;

                const bPrice = binancePrices[symbol] || 0;
                let kimp = (bPrice > 0) ? (((t.trade_price / usdtRate) - bPrice) / bPrice * 100).toFixed(2) : "-";
                const volume = Math.floor(t.acc_trade_price_24h / 1000000).toLocaleString();

                html += `<tr onclick="loadChart('${symbol}')" style="cursor:pointer;">
                    <td><div style="display:flex; align-items:center;"><img src="https://static.upbit.com/logos/${symbol}.png" class="coin-icon"><b>${m.korean_name}</b></div></td>
                    <td>${t.trade_price.toLocaleString()}</td>
                    <td class="${parseFloat(kimp)>=0?'pnl-up':'pnl-down'}" style="font-weight:bold;">${kimp}%</td>
                    <td style="color:var(--text-muted);">${bPrice ? bPrice.toLocaleString() + ' $' : '-'}</td>
                    <td class="${t.signed_change_rate>=0?'pnl-up':'pnl-down'}">${(t.signed_change_rate*100).toFixed(2)}%</td>
                    <td style="text-align:right; font-size:11px; color:var(--text-muted);">${volume}M</td>
                </tr>`;
            });
            body.innerHTML = html || '<tr><td colspan="6" style="text-align:center;">검색 결과가 없습니다.</td></tr>';
            setTimeout(renderTable, 1000);
        }

        window.onload = init;
    </script>
</body>
</html>
