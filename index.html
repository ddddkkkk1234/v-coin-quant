<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal & Sizing Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: #161b2c;
            --card-border: #2d3348;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --success: #10b981;
            --danger: #f43f5e;
            --input-bg: #1e253a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* 통계 요약 섹션 */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .summary-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        .summary-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .summary-card span {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .summary-card strong {
            display: block;
            font-size: 1.75rem;
            font-weight: 700;
            margin-top: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
        }

        /* 섹션 공통 */
        section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 1.25rem;
            background: var(--accent);
            border-radius: 2px;
        }

        /* 폼 그리드 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, select {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            padding: 0.875rem;
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* 계산기 결과 */
        .calc-results {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .result-item span {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .result-item strong {
            display: block;
            font-size: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            margin-top: 0.25rem;
        }

        .res-total { color: var(--accent); }
        .res-profit { color: var(--success); }
        .res-loss { color: var(--danger); }

        /* 버튼 */
        .btn-submit {
            grid-column: 1 / -1;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        /* 리스트 테이블 */
        .list-section {
            overflow: hidden;
            padding: 0;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem 1.5rem;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--card-border);
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--card-border);
            font-size: 0.9375rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .type-buy { color: var(--success); font-weight: 700; }
        .type-sell { color: var(--accent); font-weight: 700; }

        .btn-delete {
            color: var(--danger);
            background: none;
            border: 1px solid transparent;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8125rem;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            border-color: var(--danger);
            background: rgba(244, 63, 94, 0.1);
        }

        .empty-msg {
            padding: 4rem;
            text-align: center;
            color: var(--text-muted);
        }

        .text-right { text-align: right; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .summary-grid { grid-template-columns: 1fr; }
            section { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>TRADING PRO</h1>
            <p>Smart Journal & Position Sizing System</p>
        </header>

        <!-- 통계 요약 -->
        <div class="summary-grid">
            <div class="summary-card">
                <span>Total Realized PNL</span>
                <strong id="totalProfit" class="res-profit">0원</strong>
            </div>
            <div class="summary-card">
                <span>Trades Executed</span>
                <strong id="totalCount">0회</strong>
            </div>
            <div class="summary-card">
                <span>Winning Rate</span>
                <strong id="winRate" style="color: var(--accent)">0%</strong>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 2rem;">
            <!-- 포지션 계산기 -->
            <section>
                <h2>Position Sizing (1:2 RR)</h2>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Entry Margin</label>
                        <input type="number" id="calcEntryAmount" placeholder="진입 원금" oninput="calculateSize()">
                    </div>
                    <div class="input-group">
                        <label>Leverage</label>
                        <input type="number" id="calcLeverage" value="10" oninput="calculateSize()">
                    </div>
                    <div class="input-group">
                        <label>Stop Loss %</label>
                        <input type="number" id="calcStopLoss" value="5" oninput="calculateSize()">
                    </div>
                </div>
                
                <div class="calc-results">
                    <div class="result-item">
                        <span>Total Position</span>
                        <strong id="resTotalSize" class="res-total">0원</strong>
                    </div>
                    <div class="result-item">
                        <span>Take Profit (2.0x)</span>
                        <strong id="resProfit" class="res-profit">+0원</strong>
                    </div>
                    <div class="result-item">
                        <span>Stop Loss (1.0x)</span>
                        <strong id="resLoss" class="res-loss">-0원</strong>
                    </div>
                </div>
            </section>

            <!-- 내역 입력 -->
            <section>
                <h2>Add New Trade</h2>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Asset Name</label>
                        <input type="text" id="assetName" placeholder="BTC, ETH...">
                    </div>
                    <div class="input-group">
                        <label>Type</label>
                        <select id="tradeType">
                            <option value="매수">LONG / BUY</option>
                            <option value="매도">SHORT / SELL</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Entry Price</label>
                        <input type="number" id="tradePrice" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>Quantity</label>
                        <input type="number" id="tradeQuantity" step="any" placeholder="0">
                    </div>
                    <button class="btn-submit" onclick="addRecord()">Save Record</button>
                </div>
            </section>
        </div>

        <!-- 내역 리스트 -->
        <section class="list-section">
            <div style="padding: 1.5rem 2rem; border-bottom: 1px solid var(--card-border);">
                <h2>Recent History</h2>
            </div>
            <div class="table-container">
                <table id="recordTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Asset</th>
                            <th>Side</th>
                            <th class="text-right">Price</th>
                            <th class="text-right">Qty</th>
                            <th class="text-right">Total</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="recordBody"></tbody>
                </table>
                <div id="emptyMessage" class="empty-msg">No trades recorded yet.</div>
            </div>
        </section>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('trading_journal_records')) || [];

        function formatNumber(num) {
            return Number(num).toLocaleString();
        }

        function renderRecords() {
            const body = document.getElementById('recordBody');
            const emptyMsg = document.getElementById('emptyMessage');
            body.innerHTML = '';
            
            if (records.length === 0) {
                emptyMsg.style.display = 'block';
                document.getElementById('totalCount').innerText = '0회';
                return;
            }
            
            emptyMsg.style.display = 'none';

            records.forEach((record, index) => {
                const tr = document.createElement('tr');
                const totalAmount = record.price * record.quantity;
                const dateObj = new Date(record.id);
                const dateStr = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours()}:${dateObj.getMinutes()}`;
                
                tr.innerHTML = `
                    <td class="mono" style="color: var(--text-muted); font-size: 0.8rem;">${dateStr}</td>
                    <td style="font-weight: 600;">${record.asset}</td>
                    <td class="${record.type === '매수' ? 'type-buy' : 'type-sell'}">${record.type === '매수' ? 'LONG' : 'SHORT'}</td>
                    <td class="text-right mono">${formatNumber(record.price)}</td>
                    <td class="text-right mono">${record.quantity}</td>
                    <td class="text-right mono" style="font-weight: 600;">${formatNumber(totalAmount)}</td>
                    <td class="text-right">
                        <button class="btn-delete" onclick="deleteRecord(${index})">Delete</button>
                    </td>
                `;
                body.appendChild(tr);
            });

            document.getElementById('totalCount').innerText = `${records.length}회`;
        }

        function addRecord() {
            const asset = document.getElementById('assetName').value;
            const type = document.getElementById('tradeType').value;
            const price = document.getElementById('tradePrice').value;
            const quantity = document.getElementById('tradeQuantity').value;

            if (!asset || !price || !quantity) {
                alert('모든 정보를 입력해주세요.');
                return;
            }

            const newRecord = {
                id: Date.now(),
                asset,
                type,
                price: Number(price),
                quantity: Number(quantity)
            };

            records.unshift(newRecord);
            saveAndRender();

            document.getElementById('assetName').value = '';
            document.getElementById('tradePrice').value = '';
            document.getElementById('tradeQuantity').value = '';
        }

        function deleteRecord(index) {
            if (confirm('삭제하시겠습니까?')) {
                records.splice(index, 1);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('trading_journal_records', JSON.stringify(records));
            renderRecords();
        }

        function calculateSize() {
            const entryAmount = Number(document.getElementById('calcEntryAmount').value) || 0;
            const leverage = Number(document.getElementById('calcLeverage').value) || 0;
            const stopLossPercent = Number(document.getElementById('calcStopLoss').value) || 0;

            const totalPositionSize = entryAmount * leverage;
            const lossAmount = totalPositionSize * (stopLossPercent / 100);
            const profitAmount = lossAmount * 2;

            document.getElementById('resTotalSize').innerText = formatNumber(totalPositionSize) + '원';
            document.getElementById('resProfit').innerText = '+' + formatNumber(profitAmount) + '원';
            document.getElementById('resLoss').innerText = '-' + formatNumber(lossAmount) + '원';
        }

        renderRecords();
    </script>
</body>
</html>
