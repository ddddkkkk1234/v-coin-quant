<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRADING PRO | Master Journal v4</title>
    <!-- 고퀄리티 폰트: Pretendard (한글), JetBrains Mono (숫자) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --card-hover: #1f2937;
            --border: #374151;
            --accent: #38bdf8;
            --success: #ef4444; /* 한국 거래소 레드 */
            --danger: #3b82f6;  /* 한국 거래소 블루 */
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --input: #030712;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Pretendard", sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 1.5rem;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        /* 상단 유틸리티 */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; padding: 1rem 1.5rem;
            background: var(--card); border-radius: 16px; border: 1px solid var(--border);
        }

        .logo { font-size: 1.25rem; font-weight: 900; letter-spacing: -0.05em; color: var(--accent); }
        .controls { display: flex; gap: 1rem; align-items: center; }

        .toggle-group { display: flex; background: var(--bg); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
        .toggle-btn {
            padding: 4px 12px; border: none; background: transparent; color: var(--text-muted);
            font-size: 0.75rem; font-weight: 700; cursor: pointer; border-radius: 6px; transition: 0.2s;
        }
        .toggle-btn.active { background: var(--accent); color: #000; }

        /* 레이아웃 */
        .main-grid { display: grid; grid-template-columns: 1fr 400px; gap: 1.5rem; }

        section {
            background: var(--card); border-radius: 20px; border: 1px solid var(--border);
            padding: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        h2 { font-size: 1rem; font-weight: 800; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
        h2::before { content: ''; width: 3px; height: 1rem; background: var(--accent); border-radius: 2px; }

        /* 통계 */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg); padding: 1.25rem; border-radius: 12px; border: 1px solid var(--border); }
        .stat-card span { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; }
        .stat-card strong { display: block; font-size: 1.4rem; margin-top: 0.25rem; font-family: 'JetBrains Mono', monospace; }

        /* 입력 폼 */
        .field { margin-bottom: 1rem; }
        .field label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.4rem; }
        input, select, textarea {
            width: 100%; background: var(--input); border: 1px solid var(--border);
            padding: 0.75rem 1rem; border-radius: 10px; color: var(--text-main); font-size: 0.9rem; outline: none;
        }
        input:focus { border-color: var(--accent); }
        textarea { height: 120px; resize: none; font-size: 0.85rem; line-height: 1.6; }

        .tag-box { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
        .tag {
            padding: 4px 10px; border-radius: 6px; background: var(--border); color: var(--text-muted);
            font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .tag.active { background: rgba(56, 189, 248, 0.2); color: var(--accent); border: 1px solid var(--accent); }

        /* 리드 */
        .journal-card {
            background: var(--bg); border-radius: 16px; border: 1px solid var(--border); padding: 1.25rem;
            margin-bottom: 1rem; display: grid; grid-template-columns: 80px 1fr 180px; gap: 1rem; align-items: start;
        }
        .journal-side { font-weight: 900; font-size: 0.75rem; padding: 4px; border-radius: 4px; text-align: center; }
        .side-long { background: rgba(239, 68, 68, 0.1); color: var(--success); }
        .side-short { background: rgba(59, 130, 246, 0.1); color: var(--danger); }

        .journal-memo { margin-top: 0.75rem; padding: 0.75rem; background: rgba(255,255,255,0.02); border-radius: 8px; font-size: 0.85rem; color: #cbd5e1; }
        
        .pnl-up { color: var(--success) !important; }
        .pnl-down { color: var(--danger) !important; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .btn-main {
            width: 100%; padding: 0.8rem; border-radius: 10px; border: none; background: var(--accent);
            color: #000; font-weight: 800; cursor: pointer; margin-top: 1rem; transition: 0.2s;
        }
        .btn-main:hover { transform: translateY(-2px); filter: brightness(1.1); }

        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="captureArea">

    <div class="container">
        <!-- 상단 바 -->
        <div class="top-bar">
            <div class="logo">TRADING PRO v4.0</div>
            <div class="controls">
                <!-- 언어 선택 -->
                <div class="toggle-group">
                    <button class="toggle-btn active" id="langKR" onclick="setLang('ko')">한글</button>
                    <button class="toggle-btn" id="langEN" onclick="setLang('en')">EN</button>
                </div>
                <!-- 화폐 선택 -->
                <div class="toggle-group">
                    <button class="toggle-btn active" id="curKRW" onclick="setCur('KRW')">₩</button>
                    <button class="toggle-btn" id="curUSDT" onclick="setCur('USDT')">$</button>
                </div>
                <button class="toggle-btn" style="background: var(--border);" onclick="takeScreenshot()">캡처</button>
            </div>
        </div>

        <div class="main-grid">
            <!-- 분석 및 리스트 -->
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <section>
                    <h2 id="ui-perf-title">성과 분석</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span id="ui-net-pnl">총 손익</span>
                            <strong id="statProfit">0</strong>
                        </div>
                        <div class="stat-card">
                            <span id="ui-win-rate">승률</span>
                            <strong id="statWinRate" style="color: var(--accent);">0%</strong>
                        </div>
                        <div class="stat-card">
                            <span id="ui-total-trades">매매 횟수</span>
                            <strong id="statCount">0</strong>
                        </div>
                    </div>
                    <div style="height: 220px;">
                        <canvas id="pnlChart"></canvas>
                    </div>
                </section>

                <div id="journalList">
                    <h2 id="ui-history-title" style="padding-left: 0.5rem;">매매 복기 및 히스토리</h2>
                    <div id="recordContainer"></div>
                </div>
            </div>

            <!-- 기록 입력 -->
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <section>
                    <h2 id="ui-new-trade-title">새 매매 기록</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                        <div class="field">
                            <label id="ui-asset">종목</label>
                            <input type="text" id="assetName" placeholder="BTC, ETH...">
                        </div>
                        <div class="field">
                            <label id="ui-side">포지션</label>
                            <select id="tradeType">
                                <option value="LONG">LONG / BUY</option>
                                <option value="SHORT">SHORT / SELL</option>
                            </select>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                        <div class="field">
                            <label id="ui-entry">진입가</label>
                            <input type="number" id="entryPrice" placeholder="0.00">
                        </div>
                        <div class="field">
                            <label id="ui-exit">청산가</label>
                            <input type="number" id="exitPrice" placeholder="0.00">
                        </div>
                    </div>

                    <div class="field">
                        <label id="ui-qty">수량</label>
                        <input type="number" id="tradeQuantity" step="any" placeholder="0.00">
                    </div>

                    <div class="field">
                        <label id="ui-memo">매매 근거 및 복기 (메모)</label>
                        <textarea id="tradeMemo" placeholder="진입 이유와 실수를 기록하세요..."></textarea>
                    </div>

                    <div class="field">
                        <label id="ui-tags">태그</label>
                        <div class="tag-box" id="tagSelector">
                            <span class="tag" onclick="this.classList.toggle('active')">#뇌동매매</span>
                            <span class="tag" onclick="this.classList.toggle('active')">#원칙매매</span>
                            <span class="tag" onclick="this.classList.toggle('active')">#FOMO</span>
                            <span class="tag" onclick="this.classList.toggle('active')">#손절</span>
                            <span class="tag" onclick="this.classList.toggle('active')">#익절</span>
                        </div>
                    </div>

                    <button class="btn-main" id="ui-save-btn" onclick="addRecord()">매매 기록 저장</button>
                </section>

                <section style="background: transparent; border-style: dashed; padding: 1rem;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                        <button class="toggle-btn" style="background: var(--border); color: #fff;" onclick="exportData()">데이터 내보내기</button>
                        <button class="toggle-btn" style="background: var(--border); color: #fff;" onclick="document.getElementById('importFile').click()">가져오기</button>
                    </div>
                    <input type="file" id="importFile" style="display: none;" onchange="importData(event)">
                </section>
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            ko: {
                perfTitle: "성과 분석", historyTitle: "매매 복기 및 히스토리", newTradeTitle: "새 매매 기록",
                netPnl: "총 손익", winRate: "승률", totalTrades: "매매 횟수",
                asset: "종목", side: "포지션", entry: "진입가", exit: "청산가", qty: "수량",
                memo: "매매 근거 및 복기 (메모)", tags: "태그", saveBtn: "매매 기록 저장",
                placeholderMemo: "진입 이유와 실수를 기록하세요...", alertInput: "모든 항목과 메모를 입력해야 복기 일지입니다!",
                deleteConfirm: "이 기록을 삭제하시겠습니까?", emptyMsg: "기록이 없습니다. 첫 매매를 복기해보세요!"
            },
            en: {
                perfTitle: "Performance Analysis", historyTitle: "Trade History & Review", newTradeTitle: "Log New Trade",
                netPnl: "Total PNL", winRate: "Win Rate", totalTrades: "Total Trades",
                asset: "Asset", side: "Side", entry: "Entry", exit: "Exit", qty: "Qty",
                memo: "Trade Reason & Review", tags: "Tags", saveBtn: "Save Trade Log",
                placeholderMemo: "Why did you enter? Any mistakes?", alertInput: "Please fill all fields and memo!",
                deleteConfirm: "Delete this record?", emptyMsg: "No records yet. Start journaling!"
            }
        };

        let currentLang = 'ko';
        let currentCur = 'KRW';
        let records = JSON.parse(localStorage.getItem('trading_pro_v4_records')) || [];
        let pnlChart = null;

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('langKR').classList.toggle('active', lang === 'ko');
            document.getElementById('langEN').classList.toggle('active', lang === 'en');
            
            // UI 텍스트 업데이트
            const texts = i18n[lang];
            document.getElementById('ui-perf-title').innerText = texts.perfTitle;
            document.getElementById('ui-history-title').innerText = texts.historyTitle;
            document.getElementById('ui-new-trade-title').innerText = texts.newTradeTitle;
            document.getElementById('ui-net-pnl').innerText = texts.netPnl;
            document.getElementById('ui-win-rate').innerText = texts.winRate;
            document.getElementById('ui-total-trades').innerText = texts.totalTrades;
            document.getElementById('ui-asset').innerText = texts.asset;
            document.getElementById('ui-side').innerText = texts.side;
            document.getElementById('ui-entry').innerText = texts.entry;
            document.getElementById('ui-exit').innerText = texts.exit;
            document.getElementById('ui-qty').innerText = texts.qty;
            document.getElementById('ui-memo').innerText = texts.memo;
            document.getElementById('ui-tags').innerText = texts.tags;
            document.getElementById('ui-save-btn').innerText = texts.saveBtn;
            document.getElementById('tradeMemo').placeholder = texts.placeholderMemo;

            renderRecords();
        }

        function setCur(cur) {
            currentCur = cur;
            document.getElementById('curKRW').classList.toggle('active', cur === 'KRW');
            document.getElementById('curUSDT').classList.toggle('active', cur === 'USDT');
            renderRecords();
        }

        function formatVal(val) {
            const sym = currentCur === 'KRW' ? '₩' : '$';
            return sym + Number(val).toLocaleString(undefined, { minimumFractionDigits: currentCur === 'KRW' ? 0 : 2 });
        }

        function addRecord() {
            const asset = document.getElementById('assetName').value.toUpperCase();
            const type = document.getElementById('tradeType').value;
            const entry = Number(document.getElementById('entryPrice').value);
            const exit = Number(document.getElementById('exitPrice').value);
            const qty = Number(document.getElementById('tradeQuantity').value);
            const memo = document.getElementById('tradeMemo').value;
            const tags = Array.from(document.querySelectorAll('.tag.active')).map(t => t.innerText);

            if(!asset || !entry || !exit || !qty || !memo) {
                alert(i18n[currentLang].alertInput);
                return;
            }

            const pnl = type === 'LONG' ? (exit - entry) * qty : (entry - exit) * qty;
            const record = { id: Date.now(), asset, type, entry, exit, qty, memo, pnl, tags };

            records.unshift(record);
            saveData();
            
            // 초기화
            document.getElementById('assetName').value = '';
            document.getElementById('entryPrice').value = '';
            document.getElementById('exitPrice').value = '';
            document.getElementById('tradeQuantity').value = '';
            document.getElementById('tradeMemo').value = '';
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));

            renderRecords();
        }

        function deleteRecord(id) {
            if(confirm(i18n[currentLang].deleteConfirm)) {
                records = records.filter(r => r.id !== id);
                saveData();
                renderRecords();
            }
        }

        function saveData() { localStorage.setItem('trading_pro_v4_records', JSON.stringify(records)); }

        function renderRecords() {
            const container = document.getElementById('recordContainer');
            container.innerHTML = '';

            if (records.length === 0) {
                container.innerHTML = `<div class="journal-card" style="display:block; text-align:center; padding:3rem; color:var(--text-muted);">${i18n[currentLang].emptyMsg}</div>`;
                updateStats(0, 0, 0);
                return;
            }

            let totalP = 0; let wins = 0;
            records.forEach(r => {
                totalP += r.pnl; if(r.pnl > 0) wins++;
                const d = new Date(r.id);
                const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                
                const card = document.createElement('div');
                card.className = 'journal-card';
                card.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:0.5rem; border-right:1px solid var(--border); padding-right:1rem;">
                        <span style="font-size:0.65rem; color:var(--text-muted);">${dateStr}</span>
                        <div class="journal-side ${r.type === 'LONG' ? 'side-long' : 'side-short'}">${r.type}</div>
                    </div>
                    <div>
                        <div style="display:flex; align-items:center; gap:0.75rem;">
                            <span style="font-weight:800; font-size:1.1rem;">${r.asset}</span>
                            <span style="font-size:0.7rem; color:var(--text-muted);">IN: ${formatVal(r.entry)} / OUT: ${formatVal(r.exit)}</span>
                        </div>
                        <div class="journal-memo">${r.memo.replace(/\n/g, '<br>')}</div>
                        <div style="margin-top:0.5rem; display:flex; gap:0.4rem;">
                            ${r.tags.map(t => `<span style="font-size:0.65rem; color:var(--accent); background:rgba(56,189,248,0.1); padding:2px 6px; border-radius:4px;">${t}</span>`).join('')}
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <span style="font-size:0.65rem; color:var(--text-muted);">PNL</span>
                        <div class="mono ${r.pnl > 0 ? 'pnl-up' : 'pnl-down'}" style="font-size:1.25rem; font-weight:700;">${r.pnl > 0 ? '+' : ''}${formatVal(r.pnl)}</div>
                        <button onclick="deleteRecord(${r.id})" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.65rem; margin-top:1rem; text-decoration:underline;">Delete</button>
                    </div>
                `;
                container.appendChild(card);
            });

            updateStats(totalP, ((wins/records.length)*100).toFixed(1), records.length);
            updateChart();
        }

        function updateStats(p, w, c) {
            const el = document.getElementById('statProfit');
            el.innerText = (p > 0 ? '+' : '') + formatVal(p);
            el.className = p > 0 ? 'pnl-up' : (p < 0 ? 'pnl-down' : '');
            document.getElementById('statWinRate').innerText = w + '%';
            document.getElementById('statCount').innerText = c;
        }

        function updateChart() {
            const ctx = document.getElementById('pnlChart').getContext('2d');
            const sorted = [...records].sort((a,b) => a.id - b.id);
            let cum = 0; const data = sorted.map(r => { cum += r.pnl; return cum; });
            if (pnlChart) pnlChart.destroy();
            pnlChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Start', ...sorted.map((_, i) => i + 1)],
                    datasets: [{
                        data: [0, ...data],
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.05)',
                        fill: true, tension: 0.3, borderWidth: 2, pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b7280', font: { size: 9 } } }
                    }
                }
            });
        }

        function takeScreenshot() {
            html2canvas(document.getElementById('captureArea'), { backgroundColor: '#030712' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `trading_pro_v4_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(records)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'trading_data.json';
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if(Array.isArray(data)) { records = data; saveData(); renderRecords(); alert('Data Imported!'); }
                } catch(err) { alert('Invalid file'); }
            };
            reader.readAsText(file);
        }

        window.onload = () => setLang('ko');
    </script>
</body>
</html>
