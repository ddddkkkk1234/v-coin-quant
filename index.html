<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-LOG | 실시간 김프 & AI 매매일지</title>
    
    <meta name="google-adsense-account" content="ca-pub-5553376072633585">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5553376072633585" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <style>
        :root {
            --bg: #05070a; --card-bg: #0f172a; --nav-bg: #0f172a; --text: #f8fafc;
            --text-muted: #94a3b8; --border: #1e293b; --accent: #00f2ff;
            --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
            --ai-gradient: linear-gradient(135deg, #00f2ff 0%, #3b82f6 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Pretendard", sans-serif; }
        body { background-color: var(--bg); color: var(--text); font-size: 13px; overflow-x: hidden; }

        header { background: var(--nav-bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .nav-container { max-width: 1750px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 65px; }
        .logo { font-size: 26px; font-weight: 900; background: var(--ai-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1.5px; cursor: pointer; flex: 1; }
        .main-menu { display: flex; gap: 30px; align-items: center; justify-content: center; flex: 2; }
        .menu-item { color: var(--text-muted); font-weight: 700; cursor: pointer; font-size: 14px; transition: 0.3s; padding: 20px 0; border-bottom: 2px solid transparent; white-space: nowrap; }
        .menu-item:hover, .menu-item.active { color: var(--accent); border-bottom-color: var(--accent); }
        
        .header-right { display: flex; align-items: center; gap: 15px; flex: 1; justify-content: flex-end; }
        .utility-icons { display: flex; align-items: center; gap: 15px; color: var(--text-muted); border-left: 1px solid var(--border); padding-left: 20px; }
        .u-icon { cursor: pointer; transition: 0.2s; font-size: 18px; }
        .u-icon:hover { color: var(--accent); }
        
        .btn-journal-nav { background: var(--ai-gradient); color: #000; padding: 8px 16px; border-radius: 8px; font-weight: 800; font-size: 12px; cursor: pointer; border: none; display: flex; align-items: center; gap: 6px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2); }

        .main-container { max-width: 1750px; margin: 20px auto; display: grid; grid-template-columns: 300px 1fr 340px; gap: 20px; padding: 0 20px; }
        .left-area, .right-area { display: flex; flex-direction: column; gap: 20px; }
        .right-area, .left-area-content { position: sticky; top: 85px; height: calc(100vh - 110px); }
        .left-area-content { overflow-y: auto; padding-right: 5px; }

        .pro-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 15px; }
        .card-header { padding: 10px 15px; font-weight: 800; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .card-body { padding: 15px; }

        .mini-stat { margin-bottom: 18px; }
        .mini-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .mini-value { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text); }
        .ls-bar-container { height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; display: flex; margin: 8px 0; }
        .ls-long { background: var(--success); height: 100%; transition: 0.5s; }
        .ls-short { background: var(--danger); height: 100%; transition: 0.5s; }
        .fng-bar-mini { height: 4px; background: #1e293b; border-radius: 10px; margin-top: 6px; position: relative; }
        .fng-dot { position: absolute; width: 8px; height: 8px; background: #fff; border-radius: 50%; top: -2px; box-shadow: 0 0 10px rgba(255,255,255,0.5); transition: 0.5s; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: rgba(0,0,0,0.3); padding: 12px 8px; text-align: left; color: var(--text-muted); font-size: 11px; font-weight: 800; border-bottom: 1px solid var(--border); }
        th.sortable { cursor: pointer; transition: 0.2s; }
        th.sortable:hover { background: rgba(255,255,255,0.05); color: var(--accent); }
        td { padding: 12px 8px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        tr:hover { background: rgba(255,255,255,0.03); cursor: pointer; }

        .pnl-up { color: var(--success); }
        .pnl-down { color: var(--danger); }
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        .range-bar { width: 100%; height: 4px; background: #1e293b; border-radius: 2px; position: relative; margin-top: 8px; }
        .range-dot { position: absolute; width: 4px; height: 8px; background: var(--accent); top: -2px; border-radius: 2px; transform: translateX(-50%); transition: 0.3s; }
        
        .sort-icon { font-size: 9px; margin-left: 4px; opacity: 0.7; color: var(--accent); }
        th.active-sort { color: var(--accent); background: rgba(0, 242, 255, 0.05); }

        .btn-swap { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-swap:hover { color: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo" onclick="location.reload()">K-LOG</div>
            <nav class="main-menu">
                <div class="menu-item active" id="m-coin" onclick="switchView('coin')">암호화폐</div>
                <div class="menu-item" id="m-news" onclick="switchView('news')">뉴스</div>
                <div class="menu-item" id="m-calendar" onclick="switchView('calendar')">경제 캘린더</div>
                <div class="menu-item" id="m-analysis" onclick="switchView('analysis')"><i class="fa-solid fa-wand-magic-sparkles"></i> AI 시황분석</div>
            </nav>
            <div class="header-right">
                <div class="utility-icons">
                    <button class="btn-journal-nav" id="m-journal" onclick="switchView('journal')"><i class="fa-solid fa-book"></i> 매매일지</button>
                    <i class="fa-solid fa-gear u-icon" title="환경설정"></i>
                    <i class="fa-solid fa-circle-user u-icon" style="font-size: 22px;" title="로그인"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside class="left-area">
            <div class="left-area-content">
                <div class="pro-card">
                    <div class="card-header">📈 시장 분석 (Market Insight)</div>
                    <div class="card-body">
                        <div class="mini-stat">
                            <div class="mini-label"><span>롱·숏 비율 (24H)</span><span style="font-size:9px;"><b class="pnl-up">49.8%</b> · <b class="pnl-down">50.2%</b></span></div>
                            <div class="ls-bar-container"><div id="lsLongBar" class="ls-long" style="width: 49.8%;"></div><div id="lsShortBar" class="ls-short" style="width: 50.2%;"></div></div>
                        </div>
                        <div class="mini-stat">
                            <div class="mini-label">거래량 (24H)</div>
                            <div class="mini-value"><span id="totalVol">--</span> <span class="mini-sub pnl-up" id="volChange">--%</span></div>
                        </div>
                        <div class="mini-stat">
                            <div class="mini-label">글로벌 시가총액</div>
                            <div class="mini-value"><span id="totalCap">--</span> <span class="mini-sub pnl-down" id="capChange">--%</span></div>
                        </div>
                        <div class="mini-stat" style="margin-bottom:0; border-top:1px solid var(--border); padding-top:15px;">
                            <div class="mini-label">공포·탐욕 지수</div>
                            <div class="mini-value" style="font-size:16px;"><span id="fngValMini">--</span> <span class="mini-sub" id="fngLabelMini" style="font-size:12px; font-weight:800;">데이터 로딩...</span></div>
                            <div class="fng-bar-mini"><div id="fngDotMini" class="fng-dot" style="left: 0%;"></div></div>
                        </div>
                        <div class="mini-stat" style="margin-top:18px; border-top:1px solid var(--border); padding-top:15px;">
                            <div class="mini-label"><span>USDT 환율</span> <span id="tetherPremium" class="mini-sub pnl-up" style="font-weight:800;">--%</span></div>
                            <div class="mini-value" id="usdtDisplay" style="color:var(--accent);">--</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="center-area">
            <div id="view-coin" class="view-section active">
                <div class="pro-card" style="margin-bottom:10px; height:120px; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.2);">
                    <ins class="adsbygoogle" style="display:block; width:100%; height:120px;" data-ad-client="ca-pub-5553376072633585" data-ad-slot="auto" data-full-width-responsive="true"></ins>
                    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
                </div>
                <div class="pro-card" style="margin-bottom:20px; height:330px;"><div id="tv_chart_container" style="height:100%; width:100%"></div></div>
                <div style="display:grid; grid-template-columns: 1fr auto; gap:15px; margin-bottom:15px; align-items: end;">
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <div style="display:flex; gap:8px; align-items:center;">
                            <select id="domesticEx" style="background:var(--card-bg); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:8px; font-size:12px; cursor:pointer;" onchange="changeExchange()">
                                <option value="upbit_krw">업비트 (KRW)</option>
                                <option value="upbit_btc">업비트 (BTC)</option>
                                <option value="bithumb_krw">빗썸 (KRW)</option>
                            </select>
                            <button onclick="swapExchanges()" class="btn-swap"><i class="fa-solid fa-right-left"></i></button>
                            <select id="overseasEx" style="background:var(--card-bg); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:8px; font-size:12px; cursor:pointer;" onchange="changeExchange()">
                                <option value="binance_usdt">바이낸스 현물 (USDT)</option>
                                <option value="binance_btc">바이낸스 현물 (BTC)</option>
                                <option value="bybit_usdt">바이비트 현물 (USDT)</option>
                            </select>
                        </div>
                        <input type="text" id="coinSearch" placeholder="코인명/심볼 검색" style="width:100%; background:var(--card-bg); border:1px solid var(--border); border-radius:8px; padding:10px; color:var(--text); font-size:12px; outline:none;" oninput="renderTable()">
                    </div>
                </div>
                <div class="pro-card">
                    <table id="coinTable">
                        <thead>
                            <tr>
                                <th style="width: 140px;" class="sortable" onclick="setSort('name')">이름<span id="sort-name" class="sort-icon"></span></th>
                                <th style="width: 110px;" class="sortable" id="th-price" onclick="setSort('price')">현재가<span id="sort-price" class="sort-icon"></span></th>
                                <th style="width: 90px;" class="sortable" onclick="setSort('kimp')">김프<span id="sort-kimp" class="sort-icon"></span></th>
                                <th style="width: 80px;" class="sortable" onclick="setSort('change')">전일대비<span id="sort-change" class="sort-icon"></span></th>
                                <th style="width: 90px;" class="sortable" onclick="setSort('low52')">저가대비(52주)<span id="sort-low52" class="sort-icon"></span></th>
                                <th style="width: 90px;" class="sortable" onclick="setSort('high52')">고가대비(52주)<span id="sort-high52" class="sort-icon"></span></th>
                                <th style="width: 90px;">거래대금</th>
                                <th style="width: 100px;">지난 24시간</th>
                            </tr>
                        </thead>
                        <tbody id="globalBody"></tbody>
                    </table>
                    <div id="loadMoreContainer" style="padding: 20px; text-align: center; border-top: 1px solid var(--border); display: none;">
                        <button onclick="loadMore()" style="background: var(--border); color: var(--text); border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer; font-weight: 700;">더보기 (20개씩 더보기)</button>
                    </div>
                </div>
            </div>
            <!-- ... (뉴스, 캘린더 등 섹션 생략) ... -->
        </main>
        <aside class="right-area">
            <div class="pro-card" style="height:250px; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.2); margin-bottom:15px;"><ins class="adsbygoogle" style="display:block; width:100%; height:250px;" data-ad-client="ca-pub-5553376072633585" data-ad-slot="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});</script></div>
            <div class="pro-card" style="margin-bottom:15px;"><div class="card-header">📐 리스크 계산기 (Risk Calc)</div><div class="card-body"><input type="text" placeholder="진입가 ($)" style="width:100%; background:var(--bg); border:1px solid var(--border); padding:8px; border-radius:6px; color:var(--text); margin-bottom:8px; font-size:12px;"><div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;"><input type="number" placeholder="레버리지" style="background:var(--bg); border:1px solid var(--border); padding:8px; border-radius:6px; color:var(--text); font-size:12px;"><input type="number" placeholder="비중 (%)" style="background:var(--bg); border:1px solid var(--border); padding:8px; border-radius:6px; color:var(--text); font-size:12px;"></div><button class="btn-journal-nav" style="width:100%; justify-content:center; font-size:11px;">포지션 계산하기</button></div></div>
        </aside>
    </div>

    <script>
        let markets = [], overseasPrices = {}, tickerData = {}, usdtRate = 1460, baseRate = 1445;
        let currentDomestic = 'upbit', currentOverseas = 'binance';
        let displayLimit = 20, sortKey = 'vol', sortOrder = 'desc';
        const top20 = ["BTC", "ETH", "SOL", "XRP", "DOGE", "ADA", "AVAX", "SHIB", "DOT", "LINK", "TRX", "MATIC", "BCH", "NEAR", "LTC", "APT", "PEPE", "ETC", "STX", "ARB"];

        function init() {
            loadChart('BTC'); loadCache(); renderTable(); fetchUsdtRate(); fetchTopCoins(); 
            setTimeout(() => { fetchGlobalStats(); updateMarketList().then(() => fetchData()); }, 100);
            setInterval(renderTable, 1000); setInterval(fetchData, 4000);
        }

        function loadCache() {
            const cache = localStorage.getItem('klog_prices');
            if(cache) {
                const data = JSON.parse(cache); tickerData = data.tickerData || {}; overseasPrices = data.overseasPrices || {};
                markets = data.markets || top20.map(s => ({ market: `KRW-${s}`, korean_name: s }));
            } else { markets = top20.map(s => ({ market: `KRW-${s}`, korean_name: s })); }
        }
        function saveCache() { localStorage.setItem('klog_prices', JSON.stringify({ tickerData, overseasPrices, markets })); }

        async function fetchUsdtRate() {
            try {
                const r = await fetch('https://api.upbit.com/v1/ticker?markets=KRW-USDT');
                const data = await r.json(); usdtRate = data[0].trade_price;
                document.getElementById('usdtDisplay').innerText = usdtRate.toLocaleString();
                document.getElementById('tetherPremium').innerText = ((usdtRate / baseRate - 1) * 100).toFixed(2) + '%';
            } catch(e) {}
        }

        async function fetchTopCoins() {
            if(currentDomestic === 'upbit') {
                const codes = top20.map(s => `KRW-${s}`).join(',');
                const r = await fetch(`https://api.upbit.com/v1/ticker?markets=${codes}`);
                const data = await r.json(); data.forEach(t => { tickerData[t.market] = t; }); renderTable();
            }
        }

        async function updateMarketList() {
            try {
                const dVal = document.getElementById('domesticEx').value;
                if(dVal.startsWith('upbit')) {
                    const r = await fetch('https://api.upbit.com/v1/market/all');
                    const data = await r.json();
                    const prefix = dVal.includes('btc') ? 'BTC-' : 'KRW-';
                    markets = data.filter(x => x.market.startsWith(prefix));
                } else {
                    const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.bithumb.com/public/ticker/ALL_KRW'));
                    const data = await r.json(); const bthData = JSON.parse(data.contents).data;
                    markets = Object.keys(bthData).filter(k => k !== 'date').map(k => ({ market: `KRW-${k}`, korean_name: k }));
                }
            } catch(e) {}
        }

        async function fetchData() {
            try {
                const oVal = document.getElementById('overseasEx').value;
                const oUrl = oVal.startsWith('binance') ? 'https://api.binance.com/api/v3/ticker/price' : 'https://api.bybit.com/v5/market/tickers?category=spot';
                fetch(oVal.startsWith('binance') ? oUrl : 'https://api.allorigins.win/get?url=' + encodeURIComponent(oUrl))
                    .then(r => r.json()).then(data => {
                        if(oVal.startsWith('binance')) {
                            const suffix = oVal.includes('btc') ? 'BTC' : 'USDT';
                            data.forEach(p => { if(p.symbol.endsWith(suffix)) overseasPrices[p.symbol.replace(suffix,'')] = parseFloat(p.price); });
                        } else {
                            const res = JSON.parse(data.contents);
                            if(res.result) res.result.list.forEach(p => { if(p.symbol.endsWith('USDT')) overseasPrices[p.symbol.replace('USDT','')] = parseFloat(p.lastPrice); });
                        }
                    });

                const dVal = document.getElementById('domesticEx').value;
                if(dVal.startsWith('upbit')) {
                    const codes = markets.slice(0, 150).map(m => m.market).join(',');
                    const r = await fetch(`https://api.upbit.com/v1/ticker?markets=${codes}`);
                    const data = await r.json(); data.forEach(t => { tickerData[t.market] = t; });
                } else {
                    const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.bithumb.com/public/ticker/ALL_KRW'));
                    const data = await r.json(); const bthData = JSON.parse(data.contents).data;
                    Object.keys(bthData).forEach(k => { if(k !== 'date') tickerData[`KRW-${k}`] = { trade_price: parseFloat(bthData[k].closing_price), acc_trade_price_24h: parseFloat(bthData[k].acc_trade_value_24H), signed_change_rate: parseFloat(bthData[k].fluctate_rate_24H) / 100, high_price: parseFloat(bthData[k].high_24H), low_price: parseFloat(bthData[k].low_24H) }; });
                }
                saveCache();
            } catch(e) {}
        }

        function setSort(key) {
            if (sortKey === key) { sortOrder = sortOrder === 'asc' ? 'desc' : 'asc'; } else { sortKey = key; sortOrder = 'desc'; }
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('globalBody'); if(!body || markets.length === 0) return;
            const search = document.getElementById('coinSearch').value.toLowerCase();
            
            document.querySelectorAll('.sort-icon').forEach(el => el.innerHTML = '');
            document.querySelectorAll('th').forEach(el => el.classList.remove('active-sort'));
            const activeHeader = document.querySelector(`th[onclick*="'${sortKey}'"]`);
            if(activeHeader) { activeHeader.classList.add('active-sort'); document.getElementById(`sort-${sortKey}`).innerHTML = sortOrder === 'asc' ? ' ▲' : ' ▼'; }

            let filtered = markets.filter(m => (m.market.includes(search.toUpperCase()) || (m.korean_name || '').includes(search)));
            filtered.sort((a,b) => {
                const ta = tickerData[a.market], tb = tickerData[b.market]; if(!ta || !tb) return 0;
                let valA, valB;
                const getK = (m) => { 
                    const t = tickerData[m.market], p = overseasPrices[m.market.split('-')[1]]; 
                    return (t && p) ? ((t.trade_price / (p * usdtRate)) - 1) * 100 : -999; 
                };
                switch(sortKey) {
                    case 'name': valA = a.korean_name || a.market; valB = b.korean_name || b.market; break;
                    case 'price': valA = ta.trade_price; valB = tb.trade_price; break;
                    case 'kimp': valA = getK(a); valB = getK(b); break;
                    case 'change': valA = ta.signed_change_rate; valB = tb.signed_change_rate; break;
                    case 'low52': valA = ta.lowest_52_week_price ? (ta.trade_price / ta.lowest_52_week_price) : 0; valB = tb.lowest_52_week_price ? (tb.trade_price / tb.lowest_52_week_price) : 0; break;
                    case 'high52': valA = ta.highest_52_week_price ? (ta.trade_price / ta.highest_52_week_price) : 0; valB = tb.highest_52_week_price ? (tb.trade_price / tb.highest_52_week_price) : 0; break;
                    default: valA = ta.acc_trade_price_24h; valB = tb.acc_trade_price_24h; break;
                }
                if (valA < valB) return sortOrder === 'asc' ? -1 : 1;
                if (valA > valB) return sortOrder === 'asc' ? 1 : -1;
                return 0;
            });

            document.getElementById('loadMoreContainer').style.display = filtered.length > displayLimit ? 'block' : 'none';
            let html = '';
            filtered.slice(0, displayLimit).forEach(m => {
                const symbol = m.market.split('-')[1];
                const t = tickerData[m.market], bp = overseasPrices[symbol];
                if(!t) return;
                let kimp = "-", diff = "-", low52 = "-", high52 = "-", rangePct = 50;
                if(bp) { const conv = bp * usdtRate; kimp = (((t.trade_price - conv) / conv) * 100).toFixed(2) + "%"; diff = Math.floor(t.trade_price - conv).toLocaleString(); }
                if(t.lowest_52_week_price) {
                    low52 = "+" + (((t.trade_price - t.lowest_52_week_price) / t.lowest_52_week_price) * 100).toFixed(1) + "%";
                    high52 = (((t.trade_price - t.highest_52_week_price) / t.highest_52_week_price) * 100).toFixed(1) + "%";
                    const range = t.high_price - t.low_price; if(range > 0) rangePct = ((t.trade_price - t.low_price) / range) * 100;
                }
                html += `<tr onclick="loadChart('${symbol}')">
                    <td><div style="display:flex; align-items:center; gap:8px;"><img src="https://static.upbit.com/logos/${symbol}.png" style="width:18px; height:18px; border-radius:50%;" onerror="this.src='https://static.upbit.com/logos/BTC.png'"><div><div style="font-weight:800; font-size:13px;">${m.korean_name || m.market}</div><div style="font-size:10px; color:var(--text-muted);">${symbol}</div></div></div></td>
                    <td style="font-weight:700;">${t.trade_price.toLocaleString()}</td>
                    <td><div class="${parseFloat(kimp)>=0?'pnl-up':'pnl-down'}" style="font-weight:800;">${kimp}</div><div style="font-size:10px; color:var(--text-muted); opacity:0.7;">${diff}</div></td>
                    <td class="${t?.signed_change_rate>=0?'pnl-up':'pnl-down'}" style="font-weight:700;">${(t.signed_change_rate*100).toFixed(2)}%</td>
                    <td style="color:var(--success); font-size:11px;">${low52}</td><td style="color:var(--danger); font-size:11px;">${high52}</td>
                    <td style="font-size:12px;">${Math.floor(t.acc_trade_price_24h/1000000).toLocaleString()}M</td>
                    <td><div class="range-bar"><div class="range-dot" style="left:${rangePct}%;"></div></div><div style="display:flex; justify-content:space-between; font-size:9px; color:var(--text-muted); margin-top:4px;"><span>L</span><span>H</span></div></td>
                </tr>`;
            });
            body.innerHTML = html || '<tr><td colspan="8" style="text-align:center; padding:50px;">데이터 로딩 중...</td></tr>';
        }

        function swapExchanges() {
            const d = document.getElementById('domesticEx'); const o = document.getElementById('overseasEx');
            const temp = d.value; d.value = (d.value.includes('upbit') ? 'bithumb_krw' : 'upbit_krw');
            changeExchange();
        }

        function changeExchange() {
            const dVal = document.getElementById('domesticEx').value;
            const marketType = dVal.split('_')[1].toUpperCase();
            document.getElementById('th-price').innerText = `현재가(${marketType})`;
            displayLimit = 20; updateMarketList().then(() => fetchData());
        }

        function loadMore() { displayLimit += 20; renderTable(); }
        function loadChart(s) { new TradingView.widget({ "autosize": true, "symbol": `UPBIT:${s}KRW`, "interval": "60", "timezone": "Asia/Seoul", "theme": "dark", "container_id": "tv_chart_container" }); }
        function switchView(v) {
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active')); const activeMenu = document.getElementById(v === 'journal' ? 'm-journal' : `m-${v}`); if(activeMenu) activeMenu.classList.add('active');
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active')); const target = document.getElementById(`view-${v}`); if(target) target.classList.add('active');
        }
        async function fetchGlobalStats() {
            try {
                const g = await (await fetch('https://api.coingecko.com/api/v3/global')).json(); document.getElementById('totalCap').innerText = (g.data.total_market_cap.krw / 1000000000000).toFixed(1) + '조'; document.getElementById('totalVol').innerText = (g.data.total_volume.krw / 1000000000000).toFixed(1) + '조';
                const f = await (await fetch('https://api.alternative.me/fng/')).json(); document.getElementById('fngValMini').innerText = f.data[0].value; document.getElementById('fngDotMini').style.left = f.data[0].value + '%';
            } catch(e) {}
        }
        window.onload = init;
    </script>
</body>
</html>
