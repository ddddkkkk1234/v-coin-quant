<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매매일지 (Trading Journal)</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --buy-color: #ef4444; /* 한국식 빨강 */
            --sell-color: #3b82f6; /* 한국식 파랑 */
            --border-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            line-height: 1.5;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        /* 통계 요약 섹션 */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .summary-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .summary-card span {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .summary-card strong {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* 매매 내역 추가 폼 */
        .form-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        input, select, textarea {
            background: #0f172a;
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        .btn-submit {
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        /* 테이블 섹션 */
        .list-section {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #0f172a;
            padding: 1rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9375rem;
        }

        .type-buy { color: var(--buy-color); font-weight: 600; }
        .type-sell { color: var(--sell-color); font-weight: 600; }

        .btn-delete {
            color: #ef4444;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
            text-decoration: underline;
        }

        /* 유틸리티 클래스 */
        .text-right { text-align: right; }
        .empty-msg { padding: 3rem; text-align: center; color: var(--text-secondary); }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>매매일지 (Trading Journal)</h1>
        </header>

        <!-- 요약 정보 -->
        <div class="summary-grid">
            <div class="summary-card">
                <span>총 실현 수익</span>
                <strong id="totalProfit">0원</strong>
            </div>
            <div class="summary-card">
                <span>총 거래 횟수</span>
                <strong id="totalCount">0회</strong>
            </div>
            <div class="summary-card">
                <span>승률</span>
                <strong id="winRate">0%</strong>
            </div>
        </div>

        <!-- 내역 입력 -->
        <section class="form-section">
            <div class="form-grid">
                <div class="input-group">
                    <label>날짜</label>
                    <input type="date" id="tradeDate">
                </div>
                <div class="input-group">
                    <label>종목명</label>
                    <input type="text" id="assetName" placeholder="예: 비트코인">
                </div>
                <div class="input-group">
                    <label>매매구분</label>
                    <select id="tradeType">
                        <option value="매수">매수</option>
                        <option value="매도">매도</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>단가 (원)</label>
                    <input type="number" id="tradePrice" placeholder="0">
                </div>
                <div class="input-group">
                    <label>수량</label>
                    <input type="number" id="tradeQuantity" step="any" placeholder="0">
                </div>
            </div>
            <button class="btn-submit" onclick="addRecord()">내역 기록하기</button>
        </section>

        <!-- 내역 리스트 -->
        <div class="list-section">
            <table id="recordTable">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>종목명</th>
                        <th>구분</th>
                        <th class="text-right">단가</th>
                        <th class="text-right">수량</th>
                        <th class="text-right">합계금액</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="recordBody">
                    <!-- JS에서 동적 생성 -->
                </tbody>
            </table>
            <div id="emptyMessage" class="empty-msg">기록된 매매 내역이 없습니다.</div>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('trading_journal_records')) || [];

        // 날짜 입력 필드 오늘로 초기화
        document.getElementById('tradeDate').valueAsDate = new Date();

        // 쉼표 포맷팅
        function formatNumber(num) {
            return Number(num).toLocaleString();
        }

        // 내역 렌더링
        function renderRecords() {
            const body = document.getElementById('recordBody');
            const emptyMsg = document.getElementById('emptyMessage');
            
            body.innerHTML = '';
            
            if (records.length === 0) {
                emptyMsg.style.display = 'block';
                document.getElementById('totalProfit').innerText = '0원';
                document.getElementById('totalCount').innerText = '0회';
                document.getElementById('winRate').innerText = '0%';
                return;
            }
            
            emptyMsg.style.display = 'none';

            let totalProfit = 0;
            let buyCount = 0;
            let sellCount = 0;

            records.forEach((record, index) => {
                const tr = document.createElement('tr');
                const totalAmount = record.price * record.quantity;
                
                tr.innerHTML = `
                    <td>${record.date}</td>
                    <td>${record.asset}</td>
                    <td class="${record.type === '매수' ? 'type-buy' : 'type-sell'}">${record.type}</td>
                    <td class="text-right">${formatNumber(record.price)}원</td>
                    <td class="text-right">${record.quantity}</td>
                    <td class="text-right">${formatNumber(totalAmount)}원</td>
                    <td class="text-right">
                        <button class="btn-delete" onclick="deleteRecord(${index})">삭제</button>
                    </td>
                `;
                body.appendChild(tr);

                // 통계 계산 (간단한 예시: 매수 합계 - 매도 합계 등을 실현 수익으로 볼 수 있으나 여기서는 매도 시점에 대해서만 계산하는 등 고도화 가능)
                // 여기서는 단순히 등록된 내역 기반 정보만 요약 표시
            });

            document.getElementById('totalCount').innerText = `${records.length}회`;
            // 수익률 계산 등은 추가 로직이 필요하지만 현재는 기본 UI 구성 위주
        }

        // 내역 추가
        function addRecord() {
            const date = document.getElementById('tradeDate').value;
            const asset = document.getElementById('assetName').value;
            const type = document.getElementById('tradeType').value;
            const price = document.getElementById('tradePrice').value;
            const quantity = document.getElementById('tradeQuantity').value;

            if (!asset || !price || !quantity) {
                alert('모든 정보를 입력해주세요.');
                return;
            }

            const newRecord = {
                id: Date.now(),
                date,
                asset,
                type,
                price: Number(price),
                quantity: Number(quantity)
            };

            records.unshift(newRecord);
            saveAndRender();

            // 필드 초기화
            document.getElementById('assetName').value = '';
            document.getElementById('tradePrice').value = '';
            document.getElementById('tradeQuantity').value = '';
        }

        // 내역 삭제
        function deleteRecord(index) {
            if (confirm('정말 삭제하시겠습니까?')) {
                records.splice(index, 1);
                saveAndRender();
            }
        }

        // 저장 및 리렌더링
        function saveAndRender() {
            localStorage.setItem('trading_journal_records', JSON.stringify(records));
            renderRecords();
        }

        // 초기 실행
        renderRecords();
    </script>
</body>
</html>
